<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixtures - Corporate Sports</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding-bottom: 120px; }
        .container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; }
        .header { background: #1a73e8; color: white; padding: 16px 20px; font-size: 18px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .header-refresh { font-size: 12px; opacity: 0.8; font-weight: 400; }
        .sport-tabs { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; border-bottom: 1px solid #e0e0e0; background: white; }
        .sport-tabs::-webkit-scrollbar { display: none; }
        .sport-tab { padding: 7px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer; border: 1.5px solid #e0e0e0; color: #5f6368; transition: all 0.2s; background: white; }
        .sport-tab.active { background: #1a73e8; color: white; border-color: #1a73e8; }
        .sport-tab.disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
        .view-toggle { display: flex; margin: 12px 16px; background: #f1f3f4; border-radius: 10px; padding: 3px; }
        .view-btn { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 600; color: #5f6368; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .view-btn.active { background: white; color: #1a73e8; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
        .stage-tabs { display: flex; gap: 6px; padding: 0 16px 12px; overflow-x: auto; }
        .stage-tabs::-webkit-scrollbar { display: none; }
        .stage-tab { padding: 6px 12px; border-radius: 16px; font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; border: 1.5px solid #e0e0e0; color: #5f6368; transition: all 0.2s; background: white; }
        .stage-tab.active { background: #1a73e8; color: white; border-color: #1a73e8; }
        .stage-tab.has-live { border-color: #ea4335; color: #ea4335; }
        .stage-tab.has-live.active { background: #ea4335; color: white; border-color: #ea4335; }
        .match-card { margin: 8px 16px; padding: 14px 16px; background: white; border: 1px solid #e0e0e0; border-radius: 12px; position: relative; transition: all 0.2s; }
        .match-card.live-card { border-color: #ea4335; background: #fffafa; cursor: pointer; }
        .match-card.finished-card { opacity: 0.85; }
        .match-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .match-num { font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
        .status-live { background: #fce8e6; color: #ea4335; }
        .status-scheduled { background: #fff8e1; color: #f9a825; }
        .status-completed { background: #e6f4ea; color: #34a853; }
        .live-pulse { width: 7px; height: 7px; background: #ea4335; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.3); } }
        .match-team { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
        .match-team-name { font-size: 14px; font-weight: 500; color: #202124; }
        .match-team-name.tbd { color: #9e9e9e; font-style: italic; }
        .match-team-score { font-size: 15px; font-weight: 700; }
        .score-a { color: #1a73e8; }
        .score-b { color: #ea4335; }
        .match-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; }
        .match-result { font-size: 12px; font-weight: 600; color: #34a853; }
        .set-chips { display: flex; gap: 5px; flex-wrap: wrap; }
        .set-chip { font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
        .path-section { padding: 0 0 8px; }
        .path-round-header { display: flex; align-items: center; gap: 10px; padding: 14px 20px 10px; background: #f8f9fa; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; z-index: 5; }
        .path-round-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .path-round-title { font-size: 13px; font-weight: 700; color: #202124; text-transform: uppercase; letter-spacing: 0.4px; }
        .path-round-badge { margin-left: auto; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
        .path-match { margin: 8px 16px; padding: 12px 14px; border: 1px solid #e0e0e0; border-radius: 12px; background: white; transition: all 0.2s; position: relative; }
        .path-match.live { border-color: #ea4335; background: #fffafa; cursor: pointer; }
        .path-match.done { opacity: 0.85; }
        .path-match.tbd-match { background: #fafafa; }
        .path-match-num { font-size: 10px; font-weight: 700; color: #9e9e9e; text-transform: uppercase; margin-bottom: 6px; }
        .path-match-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; }
        .path-team { font-size: 14px; font-weight: 500; color: #202124; }
        .path-team.tbd { color: #bdbdbd; font-style: italic; font-size: 13px; }
        .path-team.winner { color: #1a73e8; font-weight: 700; }
        .path-score { font-size: 14px; font-weight: 700; }
        .path-score-a { color: #1a73e8; }
        .path-score-b { color: #ea4335; }
        .path-status { position: absolute; top: 12px; right: 12px; }
        .path-connector { display: flex; align-items: center; gap: 8px; padding: 4px 16px 4px 30px; font-size: 11px; color: #9e9e9e; }
        .path-connector-line { width: 20px; height: 1px; background: #e0e0e0; }
        .empty-state { text-align: center; padding: 40px 20px; color: #9e9e9e; font-size: 14px; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .no-sport { text-align: center; padding: 48px 20px; color: #9e9e9e; font-size: 14px; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; border-radius: 24px; padding: 12px 24px; display: flex; gap: 32px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 1000; max-width: 400px; width: calc(100% - 40px); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: all 0.2s; flex: 1; }
        .nav-icon { width: 24px; height: 24px; color: #5f6368; }
        .nav-item.active .nav-icon { color: #1a73e8; }
        .nav-label { font-size: 11px; font-weight: 500; color: #5f6368; }
        .nav-item.active .nav-label { color: #1a73e8; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <span>Fixtures</span>
        <a href="login.html" target="_blank" style="text-decoration:none;font-size:20px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;" title="Scorer Login">📝</a>
    </div>
    <div class="sport-tabs" id="sportTabs">
        <div class="skeleton" style="width:80px;height:34px;border-radius:20px;flex-shrink:0;"></div>
        <div class="skeleton" style="width:80px;height:34px;border-radius:20px;flex-shrink:0;"></div>
    </div>
    <div class="view-toggle" id="viewToggle" style="display:none">
        <div class="view-btn active" id="btnMatches" onclick="switchView('matches')">Matches</div>
        <div class="view-btn" id="btnPath" onclick="switchView('path')">Tournament Path</div>
    </div>
    <!-- Category Tabs -->
    <div id="categoryTabs" style="display:none">
        <div style="display:flex;gap:6px;padding:8px 16px 4px;overflow-x:auto;" id="categoryTabsInner"></div>
    </div>
    <div id="stageTabs" style="display:none">
        <div class="stage-tabs" id="stageTabsInner"></div>
    </div>
    <div id="mainContent">
        <div style="padding:16px;">
            <div class="skeleton" style="height:90px;margin-bottom:10px;border-radius:12px;"></div>
            <div class="skeleton" style="height:90px;margin-bottom:10px;border-radius:12px;"></div>
            <div class="skeleton" style="height:90px;border-radius:12px;"></div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="navigate('home')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span class="nav-label">Home</span>
    </div>
    <div class="nav-item active" onclick="navigate('fixtures')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
        <span class="nav-label">Fixtures</span>
    </div>
    <div class="nav-item" onclick="navigate('leaderboard')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11V3H8v6H2v12h20V11h-6zm-6-6h4v14h-4V5zm-6 6h4v8H4v-8zm16 8h-4v-6h4v6z"/></svg>
        <span class="nav-label">Leaderboard</span>
    </div>
    <div class="nav-item" onclick="navigate('stats')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4zm2.5 2.1h-15V5h15v14.1zm0-16.1h-15c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
        <span class="nav-label">Stats</span>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://izutkprvzuwrxudqvnin.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dXRrcHJ2enV3cnh1ZHF2bmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzYxNjUsImV4cCI6MjA5NTQ1MjE2NX0.MK80nCRgep3h8BpOt-Zy4EbizrXgndLD1XQCJJHIUCU';

    async function sbFetch(path) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    }

    const SPORT_TABLES = {
        'badminton': 'badminton_points', 'table tennis': 'tabletennis_points',
        'volleyball': 'volleyball_points', 'carrom': 'carrom_points', '8-ball pool': 'pool_points'
    };
    const SPORT_COLORS = {
        'Badminton': { bg: '#e8f5e9', color: '#2e7d32' },
        'Table Tennis': { bg: '#fce4ec', color: '#c62828' },
        'Volleyball': { bg: '#fff3e0', color: '#e65100' },
        'Carrom': { bg: '#f3e5f5', color: '#6a1b9a' },
        '8-Ball Pool': { bg: '#e0f7fa', color: '#00695c' }
    };
    const ALL_SPORTS   = ['Badminton','Table Tennis','Volleyball','Carrom','8-Ball Pool'];
    const ROUND_ORDER  = ['GS1','GS2','QF','QR','ER','FINAL'];
    const ROUND_LABELS = { GS1:'Group Stage 1', GS2:'Group Stage 2', QF:'Quarter Finals', QR:'Qualifier Round', ER:'Eliminator Round', FINAL:'Final' };
    const ROUND_COLORS = { GS1:'#1a73e8', GS2:'#34a853', QF:'#f9a825', QR:'#9c27b0', ER:'#ea4335', FINAL:'#e65100' };

    let allMatches = [], teamMap = {}, sportMap = {};
    let activeSport = null, activeSportName = null;
    let activeView = 'matches', activeStage = 'GS1', activeCategory = null, activePool = null;

    // ── Fetch ──────────────────────────────────────────────────
    async function fetchAll() {
        const [matches, teams, sports] = await Promise.all([
            sbFetch(`matches?order=match_number.asc&select=match_id,tournament_id,sport_id,team1_id,team2_id,scheduled_time,status,winner_team_id,points_per_set,sets_to_win,round,match_number,category,pool`),
            sbFetch(`teams?select=team_id,team_name`),
            sbFetch(`sports?select=sport_id,sport_name`)
        ]);

        teamMap  = Object.fromEntries((teams  || []).map(t => [t.team_id, t]));
        sportMap = Object.fromEntries((sports || []).map(s => [s.sport_id, s]));

        // Preserve _enriched flags for completed matches already loaded
        const prevEnriched = {};
        allMatches.forEach(m => { if (m._enriched) prevEnriched[m.match_id] = m; });

        allMatches = (matches || []).map(m => {
            const prev = prevEnriched[m.match_id];
            const base = { ...m, team1: teamMap[m.team1_id] || null, team2: teamMap[m.team2_id] || null, sport: sportMap[m.sport_id] || null, winner: teamMap[m.winner_team_id] || null };
            if (prev && prev._enriched && m.status !== 'live') {
                return { ...base, _enriched: true, _sets: prev._sets, _setsA: prev._setsA, _setsB: prev._setsB, _scoreA: prev._scoreA, _scoreB: prev._scoreB };
            }
            return base;
        });

        // Enrich live always, completed only once
        const toEnrich = allMatches.filter(m => m.status === 'live' || (!m._enriched && (m.status === 'completed' || m.status === 'walkover')));
        await Promise.all(toEnrich.map(async m => {
            await enrichMatchScores(m);
            if (m.status !== 'live') m._enriched = true;
        }));
    }

    async function enrichMatchScores(m) {
        const sport = (m.sport?.sport_name || '').toLowerCase();
        const table = SPORT_TABLES[sport];
        if (!table) return;
        try {
            const isSetBased = table === 'carrom_points' || table === 'pool_points';
            if (isSetBased) {
                const pts = await sbFetch(`${table}?match_id=eq.${m.match_id}&select=set_number,winner_team_id,points&order=set_number.asc`);
                m._setsA = (pts||[]).filter(p => p.winner_team_id === m.team1_id).length;
                m._setsB = (pts||[]).filter(p => p.winner_team_id === m.team2_id).length;
                m._sets  = (pts||[]).map(p => ({ set: p.set_number, winner: p.winner_team_id === m.team1_id ? 'A' : 'B' }));
            } else {
                const pts = await sbFetch(`${table}?match_id=eq.${m.match_id}&select=set_number,winning_team_id&order=set_number.asc`);
                if (!pts||!pts.length) { m._setsA = 0; m._setsB = 0; return; }
                const setNums = [...new Set(pts.map(p => p.set_number))].sort((a,b)=>a-b);
                m._sets = setNums.map(sn => {
                    const sp = pts.filter(p => p.set_number === sn);
                    return { set: sn, scoreA: sp.filter(p => p.winning_team_id === m.team1_id).length, scoreB: sp.filter(p => p.winning_team_id === m.team2_id).length };
                });
                const maxSet = Math.max(...setNums);
                const cur = pts.filter(p => p.set_number === maxSet);
                m._scoreA = cur.filter(p => p.winning_team_id === m.team1_id).length;
                m._scoreB = cur.filter(p => p.winning_team_id === m.team2_id).length;
                m._setsA = 0; m._setsB = 0;
                m._sets.forEach(s => {
                    if (s.scoreA >= (m.points_per_set||21)) m._setsA++;
                    else if (s.scoreB >= (m.points_per_set||21)) m._setsB++;
                });
            }
        } catch(e) { console.error('Enrich error', e); }
    }

    // ── Sport Tabs ─────────────────────────────────────────────
    function renderSportTabs() {
        const container = document.getElementById('sportTabs');
        const sportsWithMatches = new Set(allMatches.map(m => m.sport?.sport_name).filter(Boolean));

        container.innerHTML = ALL_SPORTS.map(s => {
            const hasMatches = sportsWithMatches.has(s);
            const sport = Object.values(sportMap).find(sp => sp.sport_name === s);
            const sid = sport?.sport_id || '';
            const cls = hasMatches ? (activeSportName === s ? 'sport-tab active' : 'sport-tab') : 'sport-tab disabled';
            return `<div class="${cls}" data-sport-id="${sid}" data-sport-name="${s}" onclick="selectSport('${sid}','${s}')">${s}</div>`;
        }).join('');

        if (!activeSport && sportsWithMatches.size > 0) {
            const first = ALL_SPORTS.find(s => sportsWithMatches.has(s));
            if (first) {
                const sport = Object.values(sportMap).find(sp => sp.sport_name === first);
                if (sport) {
                    activeSport     = sport.sport_id;
                    activeSportName = first;
                    document.getElementById('viewToggle').style.display = 'flex';
                }
            }
        }
        // Always render after sport tabs update
        if (activeSport) {
            // Highlight active tab
            document.querySelectorAll('.sport-tab').forEach(t => t.classList.remove('active'));
            const tab = document.querySelector(`[data-sport-id="${activeSport}"]`);
            if (tab) tab.classList.add('active');
            render();
        }
    }

    function selectSport(sportId, sportName, rerender = true) {
        activeSport = sportId; activeSportName = sportName; activeStage = 'GS1'; activeCategory = null; activePool = null;
        document.querySelectorAll('.sport-tab').forEach(t => t.classList.remove('active'));
        const tab = document.querySelector(`[data-sport-id="${sportId}"]`);
        if (tab) tab.classList.add('active');
        document.getElementById('viewToggle').style.display = 'flex';
        if (rerender) render();
    }

    function switchView(view) {
        activeView = view;
        document.getElementById('btnMatches').classList.toggle('active', view === 'matches');
        document.getElementById('btnPath').classList.toggle('active', view === 'path');
        document.getElementById('stageTabs').style.display = view === 'matches' ? 'block' : 'none';
        renderContent();
    }

    // ── Stage Tabs ─────────────────────────────────────────────
    function renderStageTabs() {
        // Filter by active sport + category + pool
        const sportMatches = allMatches.filter(m =>
            m.sport_id === activeSport &&
            (activeCategory === null || m.category === activeCategory) &&
            (activePool === null || m.pool === activePool)
        );
        const rounds = [...new Set(sportMatches.map(m => m.round).filter(Boolean))];
        const ordered = ROUND_ORDER.filter(r => rounds.includes(r));
        if (!ordered.length) { document.getElementById('stageTabs').style.display = 'none'; return; }
        document.getElementById('stageTabs').style.display = 'block';
        if (!ordered.includes(activeStage)) activeStage = ordered[0];
        document.getElementById('stageTabsInner').innerHTML = ordered.map(r => {
            const hasLive = sportMatches.some(m => m.round === r && m.status === 'live');
            let cls = 'stage-tab' + (activeStage === r ? ' active' : (hasLive ? ' has-live' : ''));
            return `<div class="${cls}" onclick="selectStage('${r}')">${ROUND_LABELS[r]}</div>`;
        }).join('');
    }

    function selectStage(round) { activeStage = round; renderStageTabs(); renderMatchesView(); }

    function renderCategoryTabs() {
        const sportMatches = allMatches.filter(m => m.sport_id === activeSport);
        const cats = [...new Set(sportMatches.map(m => m.category).filter(Boolean))].sort();
        const el = document.getElementById('categoryTabs');
        const inner = document.getElementById('categoryTabsInner');
        if (!cats.length) { el.style.display = 'none'; activeCategory = null; return; }
        el.style.display = 'block';
        inner.innerHTML = [null, ...cats].map(cat => {
            const label = cat === null ? 'All' : cat;
            const isActive = activeCategory === cat;
            const style = isActive ? 'background:#1a73e8;color:white;border-color:#1a73e8;' : '';
            return `<div onclick="selectCategory(${cat === null ? 'null' : `'${cat}'`})" style="padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:1.5px solid #e0e0e0;color:#5f6368;background:white;flex-shrink:0;transition:all 0.2s;${style}">${label}</div>`;
        }).join('');
    }

    function selectCategory(cat) {
        activeCategory = cat;
        activePool = null;
        renderCategoryTabs();
        renderPoolTabs();
        renderContent();
    }

    function renderPoolTabs() {
        const el = document.getElementById('poolTabs');
        const inner = document.getElementById('poolTabsInner');
        const sportMatches = allMatches.filter(m => m.sport_id === activeSport
            && (activeCategory === null || m.category === activeCategory));
        const pools = [...new Set(sportMatches.map(m => m.pool).filter(Boolean))].sort();
        if (!pools.length) { el.style.display = 'none'; activePool = null; return; }
        el.style.display = 'block';
        const tabs = [null, ...pools].map(p => {
            const label = p === null ? 'All' : `Pool ${p}`;
            const isActive = activePool === p;
            const style = isActive ? 'background:#1a73e8;color:white;border-color:#1a73e8;' : 'background:white;color:#5f6368;border:1.5px solid #e0e0e0;';
            return `<div onclick="selectPool(${p===null?'null':`'${p}'`})" style="padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all 0.2s;${style}">${label}</div>`;
        }).join('');
        inner.innerHTML = tabs;
    }

    function selectPool(pool) {
        activePool = pool;
        renderPoolTabs();
        renderContent();
    }

    function render() {
        if (!activeSport) { document.getElementById('mainContent').innerHTML = '<div class="no-sport">Select a sport above</div>'; return; }
        renderCategoryTabs();
        renderPoolTabs();
        renderStageTabs();
        renderContent();
    }

    function renderContent() {
        if (activeView === 'matches') renderMatchesView();
        else renderPathView();
    }

    // ── Matches View ───────────────────────────────────────────
    function renderMatchesView() {
        const content = document.getElementById('mainContent');
        const matches = allMatches.filter(m => m.sport_id === activeSport && m.round === activeStage && (activeCategory === null || m.category === activeCategory) && (activePool === null || m.pool === activePool));
        if (!matches.length) { content.innerHTML = `<div class="empty-state">No ${ROUND_LABELS[activeStage]||activeStage} matches yet</div>`; return; }
        content.innerHTML = matches.map(buildMatchCard).join('');
    }

    function buildMatchCard(m) {
        const isLive = m.status === 'live';
        const isDone = m.status === 'completed';
        const isWalkover = m.status === 'walkover';
        const isFinished = isDone || isWalkover;

        const t1 = m.team1?.team_name || `TBD (${getParentRef(m,'team1')})`;
        const t2 = m.team2?.team_name || `TBD (${getParentRef(m,'team2')})`;
        const isTBD1 = !m.team1?.team_name, isTBD2 = !m.team2?.team_name;

        const sc = SPORT_COLORS[activeSportName] || { bg:'#e8f0fe', color:'#1a73e8' };
        const time = ''; // timestamp removed

        let badge = '';
        if (isLive)     badge = `<span class="status-badge status-live"><span class="live-pulse"></span>LIVE</span>`;
        else if (isDone) badge = `<span class="status-badge status-completed">✓ Done</span>`;
        else if (isWalkover) badge = `<span class="status-badge status-completed">Walkover</span>`;
        else             badge = `<span class="status-badge status-scheduled">Scheduled</span>`;

        let s1='', s2='';
        if (isLive && m._scoreA !== undefined) { s1=`<span class="match-team-score score-a">${m._scoreA}</span>`; s2=`<span class="match-team-score score-b">${m._scoreB}</span>`; }
        if (isDone && m._setsA !== undefined)  { s1=`<span class="match-team-score score-a">${m._setsA}</span>`; s2=`<span class="match-team-score score-b">${m._setsB}</span>`; }

        const winnerName = m.winner?.team_name;
        const footer = (isFinished && winnerName)
            ? `<div class="match-footer"><span class="match-result">🏆 ${winnerName}${isWalkover?' (W/O)':''}</span>${renderSetChips(m)}</div>` : '';

        const click = isLive ? `onclick="window.location.href='livescore.html?match_id=${m.match_id}'"` : '';

        const poolLabel = m.pool ? `<span style="font-size:10px;font-weight:700;background:#e3f2fd;color:#1565c0;padding:2px 7px;border-radius:8px;">Pool ${m.pool}</span>` : '';
        return `<div class="match-card ${isLive?'live-card':''} ${isFinished?'finished-card':''}" ${click}>
            <div class="match-card-top">
                <span class="match-num" style="background:${sc.bg};color:${sc.color};padding:2px 8px;border-radius:8px;">${m.match_number||''}</span>
                <div style="display:flex;gap:5px;align-items:center;">
                    ${poolLabel}${m.category ? `<span style="font-size:11px;font-weight:600;background:#f1f3f4;color:#5f6368;padding:2px 8px;border-radius:8px;">${m.category}</span>` : ''}
                    ${badge}
                </div>
            </div>
            <div class="match-team"><span class="match-team-name ${isTBD1?'tbd':''}">${t1}</span>${s1}</div>
            <div class="match-team"><span class="match-team-name ${isTBD2?'tbd':''}">${t2}</span>${s2}</div>
            ${footer}
        </div>`;
    }

    function renderSetChips(m) {
        if (!m._sets?.length) return '';
        return `<div class="set-chips">` + m._sets.map(s => {
            const isSetBased = s.winner !== undefined && s.scoreA === undefined;
            const label = isSetBased ? `S${s.set}` : `S${s.set}: ${s.scoreA}–${s.scoreB}`;
            const aWon = isSetBased ? s.winner==='A' : s.scoreA>=(m.points_per_set||21);
            const col = aWon ? '#1a73e8' : '#ea4335';
            return `<span class="set-chip" style="background:${col}15;color:${col}">${label}</span>`;
        }).join('') + `</div>`;
    }

    // ── Tournament Path ────────────────────────────────────────
    function renderPathView() {
        const content = document.getElementById('mainContent');
        const sm = allMatches.filter(m => m.sport_id === activeSport && (activeCategory === null || m.category === activeCategory) && (activePool === null || m.pool === activePool || m.pool === null));
        const rounds = ROUND_ORDER.filter(r => sm.some(m => m.round === r) || shouldShowRound(r, sm));
        if (!rounds.length) { content.innerHTML = '<div class="empty-state">No matches created yet</div>'; return; }
        content.innerHTML = rounds.map(r => renderPathRound(r, sm)).join('');
    }

    function shouldShowRound(round, matches) {
        if (!matches.some(m => m.round === 'GS1')) return false;
        const ri = ROUND_ORDER.indexOf(round);
        const maxR = Math.max(...matches.map(m => ROUND_ORDER.indexOf(m.round)).filter(i => i >= 0));
        return ri <= maxR + 1;
    }

    function renderPathRound(round, sm) {
        const matches = sm.filter(m => m.round === round);
        const color = ROUND_COLORS[round]||'#1a73e8', label = ROUND_LABELS[round]||round;
        const hasLive = matches.some(m => m.status==='live');
        const allDone = matches.length>0 && matches.every(m => m.status==='completed'||m.status==='walkover');
        let badge = '';
        if (hasLive) badge = `<span class="path-round-badge" style="background:#fce8e6;color:#ea4335">● LIVE</span>`;
        else if (allDone) badge = `<span class="path-round-badge" style="background:#e6f4ea;color:#34a853">✓ Done</span>`;
        else if (!matches.length) badge = `<span class="path-round-badge" style="background:#f5f5f5;color:#9e9e9e">Upcoming</span>`;
        const html = matches.length ? matches.map((m,i)=>renderPathMatch(m,i,matches.length)).join('') : renderPlaceholder(round);
        return `<div class="path-section"><div class="path-round-header"><div class="path-round-dot" style="background:${color}"></div><span class="path-round-title">${label}</span>${badge}</div>${html}</div>`;
    }

    function renderPathMatch(m, idx, total) {
        const isLive = m.status==='live', isDone = m.status==='completed'||m.status==='walkover';
        const t1 = m.team1?.team_name || `TBD (${getParentRef(m,'team1')})`;
        const t2 = m.team2?.team_name || (m.status==='walkover'?'Walkover':`TBD (${getParentRef(m,'team2')})`);
        const isW1 = isDone && m.winner_team_id===m.team1_id, isW2 = isDone && m.winner_team_id===m.team2_id;
        let statusEl = '';
        if (isLive) statusEl = `<span class="path-status"><span class="status-badge status-live" style="font-size:10px;padding:2px 8px;"><span class="live-pulse"></span>LIVE</span></span>`;
        else if (isDone) statusEl = `<span class="path-status"><span class="status-badge status-completed" style="font-size:10px;padding:2px 8px;">${m.status==='walkover'?'W/O':'✓'}</span></span>`;
        let s1='', s2='';
        if (isLive && m._scoreA!==undefined) { s1=`<span class="path-score path-score-a">${m._scoreA}</span>`; s2=`<span class="path-score path-score-b">${m._scoreB}</span>`; }
        if (isDone && m._setsA!==undefined)  { s1=`<span class="path-score path-score-a">${m._setsA}</span>`; s2=`<span class="path-score path-score-b">${m._setsB}</span>`; }
        const click = isLive ? `onclick="window.location.href='livescore.html?match_id=${m.match_id}'"` : '';
        const connector = idx<total-1 ? `<div class="path-connector"><div class="path-connector-line"></div></div>` : '';
        return `<div class="path-match ${isLive?'live':''} ${isDone?'done':''} ${(!isLive&&!isDone)?'tbd-match':''}" ${click}>
            <div class="path-match-num">${m.match_number||''}</div>
            <div class="path-match-row"><span class="path-team ${!m.team1?.team_name?'tbd':''} ${isW1?'winner':''}">${t1}</span>${s1}</div>
            <div class="path-match-row"><span class="path-team ${!m.team2?.team_name?'tbd':''} ${isW2?'winner':''}">${t2}</span>${s2}</div>
            ${statusEl}</div>${connector}`;
    }

    function renderPlaceholder(round) {
        const refs = { GS2:['Winner M1/M2','Winner M3/M4...'], QF:['Winner GS2','Winner GS2'], QR:['Winner QF','Winner QF'], ER:['Loser from Q2 path','Loser from Q2 path'], FINAL:['Winner Qualifier Round','Winner Eliminator Round'] };
        const r = refs[round]||['TBD','TBD'];
        return `<div class="path-match tbd-match"><div class="path-match-num">Upcoming</div><div class="path-match-row"><span class="path-team tbd">${r[0]}</span></div><div class="path-match-row"><span class="path-team tbd">${r[1]}</span></div></div>`;
    }

    function getParentRef(m, side) {
        const refs = {
            'M11':['M1','M2'],'M12':['M3','M4'],'M13':['M5','M6'],'M14':['M7','M8'],'M15':['M9','M10'],
            'M16':['M11','M12'],'M17':['M13','M14'],'M18':['M15','—'],
            'QR1':['M16','M17'],'QR2':['M17','M18'],'QR3':['M18','M16'],
            'E1':['Q1 GS1 victim','Q1 GS2 victim'],
            'E2':['E1 winner','Q3'],
            'E3':['E2 winner','Q2'],
            'FINAL':['Q1','E3 winner']
        };
        const pair = refs[m.match_number||''];
        if (!pair) return 'TBD';
        return `W:${side==='team1'?pair[0]:pair[1]}`;
    }

    async function refresh() {
        try {
            await fetchAll();

            // Auto-select first sport with matches if none selected
            const sportsWithMatches = new Set(allMatches.map(m => m.sport?.sport_name).filter(Boolean));
            if (!activeSport && sportsWithMatches.size > 0) {
                const first = ALL_SPORTS.find(s => sportsWithMatches.has(s));
                if (first) {
                    const sport = Object.values(sportMap).find(sp => sp.sport_name === first);
                    if (sport) { activeSport = sport.sport_id; activeSportName = first; }
                }
            }

            renderSportTabs();

            if (activeSport) {
                document.getElementById('viewToggle').style.display = 'flex';
                renderCategoryTabs();
                renderPoolTabs();
                renderStageTabs();
                renderContent();
            }
        } catch(e) { console.error('Refresh error:', e); }
    }

    function navigate(page) {
        const urls = { home:'./home.html', fixtures:'./fixtures.html', leaderboard:'./leaderboard.html', stats:'./stats.html' };
        window.location.href = urls[page];
    }


    refresh();
    setInterval(refresh, 10000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Corporate Sports</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            padding-bottom: 100px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
        }

        .header {
            background-color: #1a73e8;
            color: white;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-refresh {
            font-size: 13px;
            opacity: 0.8;
            font-weight: 400;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            padding: 16px 20px 14px;
            overflow-x: auto;
            border-bottom: 1px solid #e0e0e0;
            background-color: white;
        }

        .filter-tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 7px 14px;
            border-radius: 20px;
            background: transparent;
            color: #5f6368;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }

        .tab.active { background: #1a73e8; color: white; border-color: #1a73e8; }

        /* Hero Carousel */
        .hero-section {
            padding: 16px 16px 8px;
            background: white;
        }

        .section-label {
            font-size: 13px;
            font-weight: 700;
            color: #5f6368;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-count {
            background: #ea4335;
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 10px;
        }

        .carousel-container {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .hero-banner {
            min-width: 100%;
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            border-radius: 16px;
            padding: 20px;
            color: white;
            cursor: pointer;
        }

        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            background: white;
            padding: 4px 12px 4px 8px;
            border-radius: 12px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ea4335;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .live-text {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #ea4335;
        }

        .hero-sport {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.85;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .hero-team {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .hero-team-name { font-size: 17px; font-weight: 600; }
        .hero-team-score { font-size: 17px; font-weight: 700; }

        .hero-empty {
            min-width: 100%;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            border-radius: 16px;
            padding: 32px 20px;
            color: white;
            text-align: center;
        }

        .hero-empty-icon { font-size: 32px; margin-bottom: 10px; }
        .hero-empty-text { font-size: 15px; font-weight: 500; opacity: 0.9; }

        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .dot.active { width: 24px; border-radius: 4px; background: #1a73e8; }

        /* Upcoming Section */
        .upcoming-section {
            padding: 16px 16px 8px;
            background: white;
        }

        .match-card {
            margin-bottom: 10px;
            padding: 14px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .match-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-color: #1a73e8; }

        .match-sport {
            display: inline-block;
            padding: 3px 10px;
            background: #e8f0fe;
            color: #1a73e8;
            font-size: 11px;
            font-weight: 700;
            border-radius: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .match-time-badge {
            position: absolute;
            top: 14px;
            right: 14px;
            font-size: 12px;
            color: #5f6368;
            font-weight: 500;
        }

        .match-team {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }

        .match-team-name { font-size: 14px; font-weight: 500; color: #202124; }

        .empty-state {
            text-align: center;
            padding: 32px 20px;
            color: #9e9e9e;
            font-size: 14px;
        }

        /* Skeleton loader */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 24px;
            padding: 12px 24px;
            display: flex;
            gap: 32px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            z-index: 1000;
            max-width: 400px;
            width: calc(100% - 40px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .nav-icon { width: 24px; height: 24px; color: #5f6368; transition: all 0.2s; }
        .nav-item.active .nav-icon { color: #1a73e8; }
        .nav-label { font-size: 11px; font-weight: 500; color: #5f6368; transition: all 0.2s; }
        .nav-item.active .nav-label { color: #1a73e8; font-weight: 600; }
        .nav-item:hover .nav-icon, .nav-item:hover .nav-label { color: #1a73e8; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <span>🏆 NPCI Sports</span>
        <a href="login.html" style="text-decoration:none;font-size:20px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;" title="Scorer Login">📝</a>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs" id="filterTabs">
        <div class="tab active" data-sport="all">#All</div>
    </div>

    <!-- Live Matches Carousel -->
    <div class="hero-section">
        <div class="section-label">
            🔴 Live Now
            <span class="live-count" id="liveCount">0</span>
        </div>
        <div class="carousel-container">
            <div class="carousel-track" id="carouselTrack">
                <div class="hero-banner">
                    <div class="skeleton" style="height:14px;width:60px;margin-bottom:14px;"></div>
                    <div class="skeleton" style="height:18px;width:80%;margin-bottom:10px;"></div>
                    <div class="skeleton" style="height:18px;width:70%;"></div>
                </div>
            </div>
        </div>
        <div class="carousel-dots" id="carouselDots"></div>
    </div>

    <!-- Upcoming Matches -->
    <div class="upcoming-section">
        <div class="section-label">📅 Today's Upcoming</div>
        <div id="upcomingList">
            <div class="skeleton" style="height:80px;margin-bottom:10px;border-radius:12px;"></div>
            <div class="skeleton" style="height:80px;margin-bottom:10px;border-radius:12px;"></div>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <div class="nav-item active" onclick="navigate('home')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span class="nav-label">Home</span>
    </div>
    <div class="nav-item" onclick="navigate('fixtures')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
        <span class="nav-label">Fixtures</span>
    </div>
    <div class="nav-item" onclick="navigate('leaderboard')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11V3H8v6H2v12h20V11h-6zm-6-6h4v14h-4V5zm-6 6h4v8H4v-8zm16 8h-4v-6h4v6z"/></svg>
        <span class="nav-label">Leaderboard</span>
    </div>
    <div class="nav-item" onclick="navigate('stats')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4zm2.5 2.1h-15V5h15v14.1zm0-16.1h-15c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
        <span class="nav-label">Stats</span>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://izutkprvzuwrxudqvnin.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dXRrcHJ2enV3cnh1ZHF2bmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzYxNjUsImV4cCI6MjA5NTQ1MjE2NX0.MK80nCRgep3h8BpOt-Zy4EbizrXgndLD1XQCJJHIUCU';

    async function sbFetch(path) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`
            }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    }

    // ─── State ───────────────────────────────────────────────
    let allMatches   = [];
    let liveMatches  = [];
    let upcomingMatches = [];
    let sportsList   = [];
    let currentSlide = 0;
    let autoTimer    = null;
    let activeSport  = 'all';

    // ─── Fetch matches + live scores ─────────────────────────
    async function fetchData() {
        const today      = new Date();
        const todayStart = new Date(today.getFullYear(), today.getMonth(), today.getDate()).toISOString();
        const todayEnd   = new Date(today.getFullYear(), today.getMonth(), today.getDate() + 1).toISOString();

        const fields = `match_id,tournament_id,sport_id,team1_id,team2_id,scheduled_time,status,winner_team_id,points_per_set,sets_to_win,round,match_number`;

        // Fetch live matches (any date) + today's scheduled matches
        const [liveData, scheduledData] = await Promise.all([
            sbFetch(`matches?status=eq.live&order=scheduled_time.asc&select=${fields}`),
            sbFetch(`matches?status=eq.scheduled&scheduled_time=gte.${todayStart}&scheduled_time=lt.${todayEnd}&order=scheduled_time.asc&select=${fields}`)
        ]);

        const combined = [...(liveData || []), ...(scheduledData || [])];

        if (!combined.length) {
            allMatches = []; liveMatches = []; upcomingMatches = [];
            return;
        }

        // Fetch teams and sports once
        const [teams, sports] = await Promise.all([
            sbFetch(`teams?select=team_id,team_name`),
            sbFetch(`sports?select=sport_id,sport_name`)
        ]);

        const teamMap  = Object.fromEntries((teams  || []).map(t => [t.team_id,  t]));
        const sportMap = Object.fromEntries((sports || []).map(s => [s.sport_id, s]));

        allMatches = combined.map(m => ({
            ...m,
            team1:  teamMap[m.team1_id]  || null,
            team2:  teamMap[m.team2_id]  || null,
            sport:  sportMap[m.sport_id] || null,
            winner: teamMap[m.winner_team_id] || null
        }));

        liveMatches     = allMatches.filter(m => m.status === 'live');
        upcomingMatches = allMatches.filter(m => m.status === 'scheduled');

        // For live matches, fetch current set scores from points tables
        await enrichLiveScores();
    }

    // For each live match, count set scores from the relevant points table
    async function enrichLiveScores() {
        const SPORT_TABLES = {
            'badminton':    'badminton_points',
            'table tennis': 'tabletennis_points',
            'volleyball':   'volleyball_points',
            'carrom':       'carrom_points',
            '8-ball pool':  'pool_points'
        };

        await Promise.all(liveMatches.map(async m => {
            const sport = (m.sport?.sport_name || '').toLowerCase();
            const table = SPORT_TABLES[sport];
            if (!table) return;

            try {
                const pts = await sbFetch(`${table}?match_id=eq.${m.match_id}&select=set_number,winning_team_id`);
                if (!pts || !pts.length) { m._scoreA = 0; m._scoreB = 0; return; }

                // Count points per team in current set
                const maxSet  = Math.max(...pts.map(p => p.set_number));
                const curPts  = pts.filter(p => p.set_number === maxSet);
                m._scoreA     = curPts.filter(p => p.winning_team_id === m.team1_id).length;
                m._scoreB     = curPts.filter(p => p.winning_team_id === m.team2_id).length;
                m._currentSet = maxSet;

                // Sets won
                const setsA = [...new Set(pts.filter(p => p.winning_team_id === m.team1_id).map(p => p.set_number))].length;
                const setsB = [...new Set(pts.filter(p => p.winning_team_id === m.team2_id).map(p => p.set_number))].length;

                // Carrom/Pool: use winner_team_id per set row instead
                if (table === 'carrom_points' || table === 'pool_points') {
                    const allPts = await sbFetch(`${table}?match_id=eq.${m.match_id}&select=set_number,winner_team_id`);
                    m._setsA = (allPts || []).filter(p => p.winner_team_id === m.team1_id).length;
                    m._setsB = (allPts || []).filter(p => p.winner_team_id === m.team2_id).length;
                    m._scoreA = m._setsA;
                    m._scoreB = m._setsB;
                } else {
                    m._setsA = setsA;
                    m._setsB = setsB;
                }

            } catch (e) {
                console.error('Score fetch error:', e);
            }
        }));
    }

    // ─── Render ───────────────────────────────────────────────
    function getFilteredLive() {
        if (activeSport === 'all') return liveMatches;
        return liveMatches.filter(m =>
            (m.sport?.sport_name || '').toLowerCase().includes(activeSport.toLowerCase())
        );
    }

    function getFilteredUpcoming() {
        if (activeSport === 'all') return upcomingMatches;
        return upcomingMatches.filter(m =>
            (m.sport?.sport_name || '').toLowerCase().includes(activeSport.toLowerCase())
        );
    }

    function renderCarousel() {
        const track    = document.getElementById('carouselTrack');
        const dotsEl   = document.getElementById('carouselDots');
        const filtered = getFilteredLive();

        document.getElementById('liveCount').textContent = filtered.length;

        if (!filtered.length) {
            track.innerHTML = `
                <div class="hero-banner">
                    <div class="hero-empty">
                        <div class="hero-empty-icon">🏸</div>
                        <div class="hero-empty-text">No live matches right now</div>
                    </div>
                </div>`;
            dotsEl.innerHTML = '';
            return;
        }

        track.innerHTML = filtered.map(m => {
            const sport   = m.sport?.sport_name || '';
            const team1   = m.team1?.team_name || '—';
            const team2   = m.team2?.team_name || '—';
            const scoreA  = m._scoreA !== undefined ? m._scoreA : '—';
            const scoreB  = m._scoreB !== undefined ? m._scoreB : '—';
            const setInfo = m._currentSet ? `Set ${m._currentSet}` : '';
            const ROUND_LABELS = { GS1: 'Group Stage 1', GS2: 'Group Stage 2', QF: 'Quarter Finals', QR: 'Qualifier Round', ER: 'Eliminator Round', FINAL: 'Final' };
            const roundLabel = m.round ? ROUND_LABELS[m.round] || m.round : '';
            const matchNum   = m.match_number || '';
            const SPORT_COLORS_H = { 'Badminton': '#2e7d32', 'Table Tennis': '#c62828', 'Volleyball': '#e65100', 'Carrom': '#6a1b9a', '8-Ball Pool': '#00695c' };
            const sportAccent = SPORT_COLORS_H[sport] || '#64b5f6';

            return `
                <div class="hero-banner" data-match-id="${m.match_id}" onclick="window.location.href='livescore.html?match_id=${m.match_id}'">
                    <div class="live-indicator">
                        <div class="live-dot"></div>
                        <span class="live-text">Live</span>
                    </div>
                    <div class="hero-sport">${sport}${m.category ? ' · ' + m.category : ''} ${roundLabel ? '· ' + roundLabel : ''} ${matchNum ? '· ' + matchNum : ''} ${setInfo ? '· ' + setInfo : ''}</div>
                    <div>
                        <div class="hero-team">
                            <span class="hero-team-name">${team1}</span>
                            <span class="hero-team-score">${scoreA}</span>
                        </div>
                        <div class="hero-team">
                            <span class="hero-team-name">${team2}</span>
                            <span class="hero-team-score">${scoreB}</span>
                        </div>
                    </div>
                </div>`;
        }).join('');

        // Dots
        dotsEl.innerHTML = filtered.map((_, i) =>
            `<div class="dot ${i === currentSlide ? 'active' : ''}" onclick="goToSlide(${i})"></div>`
        ).join('');

        // Keep slide in range
        if (currentSlide >= filtered.length) currentSlide = 0;
        goToSlide(currentSlide);
    }

    function renderUpcoming() {
        const list     = document.getElementById('upcomingList');
        const filtered = getFilteredUpcoming();

        if (!filtered.length) {
            list.innerHTML = '<div class="empty-state">No upcoming matches today</div>';
            return;
        }

        list.innerHTML = filtered.map(m => {
            const sport = m.sport?.sport_name || '—';
            const team1 = m.team1?.team_name || '—';
            const team2 = m.team2?.team_name || '—';
            const time  = m.scheduled_time
                ? new Date(m.scheduled_time).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
                : '';
            const ROUND_LABELS = { GS1: 'Group Stage 1', GS2: 'Group Stage 2', QF: 'Quarter Finals', QR: 'Qualifier Round', ER: 'Eliminator Round', FINAL: 'Final' };
            const roundLabel = m.round ? ROUND_LABELS[m.round] || m.round : null;
            const matchNum   = m.match_number || '';
            const SPORT_COLORS = { 'Badminton': { bg: '#e8f5e9', color: '#2e7d32' }, 'Table Tennis': { bg: '#fce4ec', color: '#c62828' }, 'Volleyball': { bg: '#fff3e0', color: '#e65100' }, 'Carrom': { bg: '#f3e5f5', color: '#6a1b9a' }, '8-Ball Pool': { bg: '#e0f7fa', color: '#00695c' } };
            const sportColor = SPORT_COLORS[sport] || { bg: '#e8f0fe', color: '#1a73e8' };
            return `
                <div class="match-card" onclick="window.location.href='fixtures.html'">
                    <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap;">
                        <span class="match-sport" style="background:${sportColor.bg};color:${sportColor.color}">${sport}</span>
                        ${m.category ? `<span style="font-size:11px;font-weight:600;background:#f1f3f4;color:#5f6368;padding:2px 8px;border-radius:8px;">${m.category}</span>` : ''}
                    </div>
                    ${roundLabel ? `<div style="margin-bottom:8px;"><span style="font-size:11px;font-weight:700;background:#f1f3f4;color:#5f6368;padding:2px 8px;border-radius:8px;">${roundLabel}${matchNum ? ' · ' + matchNum : ''}</span></div>` : ''}
                    <div>
                        <div class="match-team"><span class="match-team-name">${team1}</span></div>
                        <div class="match-team"><span class="match-team-name">${team2}</span></div>
                    </div>
                </div>`;
        }).join('');
    }

    function renderSportTabs() {
        const tabs     = document.getElementById('filterTabs');
        const sports   = [...new Set(allMatches.map(m => m.sport?.sport_name).filter(Boolean))];

        tabs.innerHTML = `<div class="tab active" data-sport="all">#All</div>` +
            sports.map(s => `<div class="tab" data-sport="${s.toLowerCase()}">#${s}</div>`).join('');

        tabs.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activeSport = tab.dataset.sport;
                currentSlide = 0;
                renderCarousel();
                renderUpcoming();
            });
        });
    }

    function updateLastUpdated() {
        
    }

    // ─── Carousel controls ────────────────────────────────────
    function goToSlide(index) {
        const track    = document.getElementById('carouselTrack');
        const dotsEl   = document.getElementById('carouselDots');
        const filtered = getFilteredLive();
        if (!filtered.length) return;

        currentSlide = Math.max(0, Math.min(index, filtered.length - 1));
        track.style.transform = `translateX(-${currentSlide * 100}%)`;
        dotsEl.querySelectorAll('.dot').forEach((d, i) =>
            d.classList.toggle('active', i === currentSlide)
        );
    }

    function startAutoScroll() {
        if (autoTimer) clearInterval(autoTimer);
        autoTimer = setInterval(() => {
            const filtered = getFilteredLive();
            if (filtered.length > 1) {
                currentSlide = (currentSlide + 1) % filtered.length;
                goToSlide(currentSlide);
            }
        }, 4000);
    }

    // ─── Main loop ────────────────────────────────────────────
    async function refresh() {
        try {
            await fetchData();
            renderSportTabs();
            renderCarousel();
            renderUpcoming();
            updateLastUpdated();
        } catch (e) {
            console.error('Refresh error:', e);
        }
    }

    async function init() {
        await refresh();
        startAutoScroll();
        // Poll every 10 seconds for live updates
        setInterval(refresh, 10000);
    }

    function navigate(page) {
        const urls = {
            home: './home.html', fixtures: './fixtures.html',
            leaderboard: './leaderboard.html', stats: './stats.html'
        };
        if (event) { event.preventDefault(); event.stopPropagation(); }
        window.location.href = urls[page];
    }


    init();
</script>
</body>
</html>

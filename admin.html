<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Corporate Sports</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
        }

        /* Header */
        /* Matches list */
        .matches-section { padding: 20px; }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #5f6368;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: #9e9e9e;
            font-size: 14px;
        }

        .empty-icon { font-size: 40px; margin-bottom: 12px; }

        .match-card {
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            background: white;
            position: relative;
        }

        .match-card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .sport-badge {
            display: inline-block;
            padding: 4px 10px;
            background-color: #e8f0fe;
            color: #1a73e8;
            font-size: 11px;
            font-weight: 600;
            border-radius: 12px;
            text-transform: uppercase;
        }

        .match-time {
            font-size: 12px;
            color: #9e9e9e;
        }

        .match-teams { margin-bottom: 8px; }

        .match-team {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }

        .match-team-name {
            font-size: 15px;
            font-weight: 500;
            color: #202124;
        }

        .match-meta {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
        }

        .match-meta-item {
            font-size: 12px;
            color: #5f6368;
        }

        .status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-scheduled { background-color: #fff8e1; color: #f9a825; }
        .status-live { background-color: #fce8e6; color: #ea4335; }
        .status-completed { background-color: #e6f4ea; color: #34a853; }

        .match-card-clickable {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .match-card-clickable:hover {
            border-color: #1a73e8;
            box-shadow: 0 2px 8px rgba(26,115,232,0.12);
        }
        .match-card-arrow {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 22px;
            color: #1a73e8;
            font-weight: 300;
        }


        /* Hamburger & Profile Menu */
        .header {
            background-color: #1a73e8;
            color: white;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hamburger-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .hamburger-btn:hover { background: rgba(255,255,255,0.3); }

        .profile-menu {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .profile-avatar {
            width: 44px;
            height: 44px;
            background: #1a73e8;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .profile-name {
            font-size: 15px;
            font-weight: 700;
            color: #202124;
        }

        .profile-username {
            font-size: 13px;
            color: #5f6368;
            margin-top: 2px;
        }

        .profile-divider {
            height: 1px;
            background: #f0f0f0;
            margin-bottom: 12px;
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: #fce8e6;
            color: #c62828;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s;
        }

        .logout-btn:hover { background: #f5c6c3; }

        /* Tabs */
        .tab-bar {
            display: flex;
            border-bottom: 2px solid #f0f0f0;
            background: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #5f6368;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #1a73e8;
            border-bottom-color: #1a73e8;
        }

        .match-card-completed {
            opacity: 0.85;
        }

        .winner-tag {
            display: inline-block;
            padding: 3px 8px;
            background: #e6f4ea;
            color: #34a853;
            font-size: 11px;
            font-weight: 600;
            border-radius: 8px;
            margin-top: 6px;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 56px;
            height: 56px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(26, 115, 232, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            z-index: 50;
        }

        .fab:hover { background-color: #1557b0; transform: scale(1.08); }
        .fab:active { transform: scale(0.95); }

        /* Drawer overlay */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }

        .overlay.visible { display: flex; animation: fadeOverlay 0.2s ease; }
        @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }

        /* Drawer */
        .drawer {
            background: white;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .drawer-handle {
            width: 40px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin: 12px auto 0;
        }

        .drawer-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f0f0;
        }

        .drawer-title {
            font-size: 17px;
            font-weight: 700;
            color: #202124;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #5f6368;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
        }

        /* Step indicator */
        .step-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 0;
        }

        .step {
            flex: 1;
            text-align: center;
            position: relative;
        }

        .step-number {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #e0e0e0;
            color: #5f6368;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            margin: 0 auto 6px;
            transition: all 0.3s ease;
        }

        .step.active .step-number { background-color: #1a73e8; color: white; }
        .step.completed .step-number { background-color: #34a853; color: white; }

        .step-label { font-size: 10px; color: #9e9e9e; font-weight: 500; }
        .step.active .step-label { color: #1a73e8; font-weight: 600; }

        .step-line {
            position: absolute;
            top: 15px;
            left: 50%;
            width: 100%;
            height: 2px;
            background-color: #e0e0e0;
            z-index: -1;
        }

        .step:last-child .step-line { display: none; }
        .step.completed .step-line { background-color: #34a853; }

        /* Form */
        .form-body { padding: 20px; }

        .form-step { display: none; animation: fadeIn 0.3s ease; }
        .form-step.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #202124;
            margin-bottom: 8px;
        }

        .form-select, .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            color: #202124;
            background: white;
            transition: all 0.2s ease;
        }

        .form-select:focus, .form-input:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
        }

        .team-selection { display: grid; gap: 10px; }

        .team-option {
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .team-option:hover { border-color: #1a73e8; background: #f8f9fa; }
        .team-option.selected { border-color: #1a73e8; background: #e8f0fe; }

        .team-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #ccc;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .team-option.selected .team-checkbox {
            background: #1a73e8;
            border-color: #1a73e8;
        }

        .team-option.selected .team-checkbox::after {
            content: '✓';
            color: white;
            font-size: 13px;
            font-weight: 700;
        }

        .team-name-text { font-size: 14px; font-weight: 500; color: #202124; }

        .counter-group {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
        }

        .counter-btn {
            width: 38px;
            height: 38px;
            border: none;
            background: #1a73e8;
            color: white;
            border-radius: 50%;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .counter-btn:hover { background: #1557b0; }

        .counter-value {
            flex: 1;
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: #202124;
        }

        .points-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .points-row .form-input { flex: 1; }
        .points-row span { font-size: 14px; color: #5f6368; white-space: nowrap; }

        /* Form actions */
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
            padding-bottom: 8px;
        }

        .btn-secondary, .btn-primary {
            flex: 1;
            padding: 13px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary { background: #f1f3f4; color: #5f6368; }
        .btn-secondary:hover { background: #e8eaed; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #1557b0; }
        .btn-primary:disabled { background: #e0e0e0; color: #9e9e9e; cursor: not-allowed; }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script>
        // ─── Auth helpers (inlined) ───────────────────────────
        function getScorer() {
            return {
                id:       sessionStorage.getItem('scorer_id'),
                name:     sessionStorage.getItem('scorer_name'),
                username: sessionStorage.getItem('scorer_user')
            };
        }
        function requireAuth() {
            const s = getScorer();
            if (!s.id) { window.location.href = 'login.html'; return null; }
            return s;
        }
        function logout() {
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <span>Admin Panel</span>
            <button class="hamburger-btn" onclick="toggleMenu()" id="hamburgerBtn">☰</button>
        </div>

        <!-- Profile dropdown -->
        <div class="profile-menu" id="profileMenu" style="display:none;">
            <div class="profile-info">
                <div class="profile-avatar" id="profileAvatar">A</div>
                <div>
                    <div class="profile-name" id="profileName">—</div>
                    <div class="profile-username" id="profileUsername">—</div>
                </div>
            </div>
            <div class="profile-divider"></div>
            <button class="logout-btn" onclick="logout()">🚪 &nbsp;Logout</button>
        </div>

        <div class="tab-bar">
            <div class="tab-btn active" id="tabScheduled" onclick="switchTab('scheduled')">Scheduled</div>
            <div class="tab-btn" id="tabCompleted" onclick="switchTab('completed')">Completed</div>
        </div>

        <div class="matches-section">
            <div id="matchesList"></div>
        </div>
    </div>

    <!-- FAB -->
    <button class="fab" onclick="openDrawer()">+</button>

    <!-- Drawer Overlay -->
    <div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
        <div class="drawer" id="drawer">
            <div class="drawer-handle"></div>
            <div class="drawer-header">
                <span class="drawer-title">Create New Game</span>
                <button class="close-btn" onclick="closeDrawer()">✕</button>
            </div>

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step active" id="stepIndicator1">
                    <div class="step-number">1</div>
                    <div class="step-label">Game</div>
                    <div class="step-line"></div>
                </div>
                <div class="step" id="stepIndicator2">
                    <div class="step-number">2</div>
                    <div class="step-label">Teams</div>
                    <div class="step-line"></div>
                </div>
                <div class="step" id="stepIndicator3">
                    <div class="step-number">3</div>
                    <div class="step-label">Schedule</div>
                    <div class="step-line"></div>
                </div>
                <div class="step" id="stepIndicator4">
                    <div class="step-number">4</div>
                    <div class="step-label">Details</div>
                </div>
            </div>

            <div class="form-body">
                <!-- Step 1: Game -->
                <div class="form-step active" id="step1">
                    <div class="form-group">
                        <label class="form-label">Select Game</label>
                        <select class="form-select" id="gameSelect">
                            <option value="">Loading sports...</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button class="btn-secondary" onclick="closeDrawer()">Cancel</button>
                        <button class="btn-primary" id="nextBtn1" onclick="nextStep(1)" disabled>Next</button>
                    </div>
                </div>

                <!-- Step 2: Teams -->
                <div class="form-step" id="step2">
                    <div class="form-group">
                        <label class="form-label">Select 2 Teams</label>
                        <div class="team-selection" id="teamSelection"></div>
                    </div>
                    <div class="form-actions">
                        <button class="btn-secondary" onclick="prevStep(2)">Back</button>
                        <button class="btn-primary" id="nextBtn2" onclick="nextStep(2)" disabled>Next</button>
                    </div>
                </div>

                <!-- Step 3: Schedule -->
                <div class="form-step" id="step3">
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-input" id="scheduleDate">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Time</label>
                        <input type="time" class="form-input" id="scheduleTime">
                    </div>
                    <div class="form-actions">
                        <button class="btn-secondary" onclick="prevStep(3)">Back</button>
                        <button class="btn-primary" id="nextBtn3" onclick="nextStep(3)" disabled>Next</button>
                    </div>
                </div>

                <!-- Step 4: Sets & Points -->
                <div class="form-step" id="step4">
                    <div class="form-group">
                        <label class="form-label">Number of Sets</label>
                        <div class="counter-group">
                            <button class="counter-btn" onclick="decrementSets()">−</button>
                            <div class="counter-value" id="setCount">1</div>
                            <button class="counter-btn" onclick="incrementSets()">+</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Points per Set</label>
                        <div class="points-row">
                            <input type="number" class="form-input" id="pointsPerSet" value="21" min="1">
                            <span>points to win</span>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button class="btn-secondary" onclick="prevStep(4)">Back</button>
                        <button class="btn-primary" id="createBtn" onclick="createGame()">Create Game</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://izutkprvzuwrxudqvnin.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dXRrcHJ2enV3cnh1ZHF2bmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzYxNjUsImV4cCI6MjA5NTQ1MjE2NX0.MK80nCRgep3h8BpOt-Zy4EbizrXgndLD1XQCJJHIUCU';

        async function sbFetch(path, options = {}) {
            const { extraHeaders = {}, body, method = 'GET' } = options;
            const fetchOptions = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    ...extraHeaders
                }
            };
            if (body) fetchOptions.body = JSON.stringify(body);
            const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, fetchOptions);
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.message || `HTTP ${res.status}`);
            }
            if (method === 'POST') return null;
            return res.json();
        }

        // ─── State ───────────────────────────────────────────
        let currentStep = 1;
        let selectedTeams = [];
        let setCount = 1;
        let sportsList = [];
        let teamsList = [];
        let selectedSportId = null;
        let tournamentId = null;
        let matchesList = [];

        // ─── Init ─────────────────────────────────────────────
        async function init() {
            try {
                const tournaments = await sbFetch('tournament?select=*&limit=5');
                if (!tournaments || !tournaments.length) return showError('No tournaments found.');
                const live = tournaments.find(t => t.status === 'live') || tournaments[0];
                tournamentId = live.tournament_id;

                sportsList = await sbFetch('sports?order=sport_name');
                teamsList = await sbFetch(`teams?tournament_id=eq.${tournamentId}&order=team_name`);

                await loadMatches();
            } catch (e) {
                console.error(e);
                showError('Failed to load: ' + e.message);
            }
        }

        // ─── Load & Render Matches ────────────────────────────
        let activeTab = 'scheduled';

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tabScheduled').classList.toggle('active', tab === 'scheduled');
            document.getElementById('tabCompleted').classList.toggle('active', tab === 'completed');
            renderMatches();
        }

        async function loadMatches() {
            try {
                const matches = await sbFetch(
                    `matches?tournament_id=eq.${tournamentId}&order=scheduled_time.desc&select=match_id,tournament_id,sport_id,team1_id,team2_id,scheduled_time,status,winner_team_id,points_per_set,sets_to_win,round,match_number`
                );
                if (!matches || !matches.length) { matchesList = []; renderMatches(); return; }

                const [teams, sports] = await Promise.all([
                    sbFetch(`teams?select=team_id,team_name`),
                    sbFetch(`sports?select=sport_id,sport_name`)
                ]);
                const teamMap  = Object.fromEntries((teams  || []).map(t => [t.team_id,  t]));
                const sportMap = Object.fromEntries((sports || []).map(s => [s.sport_id, s]));

                matchesList = matches.map(m => ({
                    ...m,
                    team1:  teamMap[m.team1_id]  || null,
                    team2:  teamMap[m.team2_id]  || null,
                    sport:  sportMap[m.sport_id] || null,
                    winner: teamMap[m.winner_team_id] || null
                }));
                renderMatches();
            } catch (e) {
                console.error('Failed to load matches:', e);
            }
        }

        const SPORT_PAGES = {
            'badminton':    'badminton.html',
            'table tennis': 'tabletennis.html',
            'volleyball':   'volleyball.html',
            'carrom':       'carrom.html',
            '8-ball pool':  'pool.html'
        };

        function getScorerPage(sportName) {
            return SPORT_PAGES[(sportName || '').toLowerCase()] || null;
        }

        function openScorer(matchId, sportName) {
            const page = getScorerPage(sportName);
            if (!page) return alert(`No scorer page for ${sportName} yet.`);
            window.location.href = `${page}?match_id=${matchId}`;
        }

        function renderMatches() {
            const container = document.getElementById('matchesList');

            const filtered = matchesList.filter(m =>
                activeTab === 'completed'
                    ? (m.status === 'completed' || m.status === 'walkover')
                    : (m.status !== 'completed' && m.status !== 'walkover')
            );

            if (!filtered.length) {
                const msg = activeTab === 'completed'
                    ? 'No completed matches yet.'
                    : 'No matches yet. Tap + to create one.';
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">${activeTab === 'completed' ? '🏆' : '📅'}</div>
                        <div>${msg}</div>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map(m => {
                const time = m.scheduled_time
                    ? new Date(m.scheduled_time).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })
                    : '—';
                const sport = m.sport?.sport_name || '—';
                const team1 = m.team1?.team_name || '—';
                const team2 = m.team2?.team_name || '—';
                const statusClass = `status-${m.status || 'scheduled'}`;
                const clickable = activeTab !== 'completed' && getScorerPage(sport);
                const winnerName = m.winner?.team_name || null;

                const ROUND_LABELS = {
                    GS1: 'Group Stage 1', GS2: 'Group Stage 2',
                    QF: 'Quarter Finals', QR: 'Qualifier Round',
                    ER: 'Eliminator Round', FINAL: 'Final'
                };
                const SPORT_COLORS = {
                    'Badminton':    { bg: '#e8f5e9', color: '#2e7d32' },
                    'Table Tennis': { bg: '#fce4ec', color: '#c62828' },
                    'Volleyball':   { bg: '#fff3e0', color: '#e65100' },
                    'Carrom':       { bg: '#f3e5f5', color: '#6a1b9a' },
                    '8-Ball Pool':  { bg: '#e0f7fa', color: '#00695c' },
                };
                const sportColor = SPORT_COLORS[sport] || { bg: '#e8f0fe', color: '#1a73e8' };
                const roundLabel = m.round ? ROUND_LABELS[m.round] || m.round : null;
                const matchNum   = m.match_number || '';

                return `
                    <div class="match-card ${clickable ? 'match-card-clickable' : ''} ${m.status === 'completed' ? 'match-card-completed' : ''}"
                         ${clickable ? `onclick="openScorer('${m.match_id}', '${sport}')"` : ''}>
                        <div class="match-card-top">
                            <span class="sport-badge" style="background:${sportColor.bg};color:${sportColor.color}">${sport}</span>
                        </div>
                        ${roundLabel ? `<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
                            <span style="font-size:11px;font-weight:700;background:#f1f3f4;color:#5f6368;padding:3px 8px;border-radius:8px;text-transform:uppercase;">${roundLabel}</span>
                            ${matchNum ? `<span style="font-size:11px;font-weight:700;color:#9e9e9e;">${matchNum}</span>` : ''}
                        </div>` : ''}
                        <div class="match-teams">
                            <div class="match-team"><span class="match-team-name">${team1}</span></div>
                            <div class="match-team"><span class="match-team-name">${team2}</span></div>
                        </div>
                        <div class="match-meta">
                            <span class="match-meta-item">Sets to win: ${m.sets_to_win}</span>
                            <span class="match-meta-item">Points/set: ${m.points_per_set}</span>
                            <span class="status-badge ${statusClass}">${m.status}</span>
                        </div>
                        ${winnerName ? `<div class="winner-tag">🏆 ${winnerName}</div>` : ''}
                        ${clickable ? '<div class="match-card-arrow">›</div>' : ''}
                    </div>`;
            }).join('');
        }

        // ─── Drawer ───────────────────────────────────────────
        function openDrawer() {
            renderSports();
            document.getElementById('overlay').classList.add('visible');
        }

        function closeDrawer() {
            document.getElementById('overlay').classList.remove('visible');
            resetForm();
        }

        function handleOverlayClick(e) {
            if (e.target === document.getElementById('overlay')) closeDrawer();
        }

        // ─── Step 1: Sports ───────────────────────────────────
        const EXCLUDED_SPORTS = ['Cricket', 'Football', 'Chess'];

        function renderSports() {
            const select = document.getElementById('gameSelect');
            select.innerHTML = '<option value="">Choose a game...</option>';
            sportsList
                .filter(s => !EXCLUDED_SPORTS.includes(s.sport_name))
                .forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s.sport_id;
                    opt.textContent = s.sport_name;
                    select.appendChild(opt);
                });
            select.onchange = function () {
                selectedSportId = this.value || null;
                document.getElementById('nextBtn1').disabled = !selectedSportId;
            };
        }

        // ─── Step 2: Teams ────────────────────────────────────
        function renderTeams() {
            const container = document.getElementById('teamSelection');
            container.innerHTML = '';
            selectedTeams = [];
            teamsList.forEach(team => {
                const div = document.createElement('div');
                div.className = 'team-option';
                div.innerHTML = `<div class="team-checkbox"></div><div class="team-name-text">${team.team_name}</div>`;
                div.onclick = () => toggleTeam(div, team.team_id, team.team_name);
                container.appendChild(div);
            });
        }

        function toggleTeam(el, teamId, teamName) {
            if (el.classList.contains('selected')) {
                el.classList.remove('selected');
                selectedTeams = selectedTeams.filter(t => t.team_id !== teamId);
            } else {
                if (selectedTeams.length >= 2) return;
                el.classList.add('selected');
                selectedTeams.push({ team_id: teamId, team_name: teamName });
            }
            document.getElementById('nextBtn2').disabled = selectedTeams.length !== 2;
        }

        // ─── Step 3: Schedule ─────────────────────────────────
        function setupScheduleListeners() {
            document.getElementById('scheduleDate').onchange = validateSchedule;
            document.getElementById('scheduleTime').onchange = validateSchedule;
        }

        function validateSchedule() {
            const d = document.getElementById('scheduleDate').value;
            const t = document.getElementById('scheduleTime').value;
            document.getElementById('nextBtn3').disabled = !(d && t);
        }

        // ─── Step 4: Sets ─────────────────────────────────────
        function incrementSets() { if (setCount < 5) { setCount++; document.getElementById('setCount').textContent = setCount; } }
        function decrementSets() { if (setCount > 1) { setCount--; document.getElementById('setCount').textContent = setCount; } }

        // ─── Step Navigation ──────────────────────────────────
        function nextStep(step) {
            if (step === 1) { renderTeams(); setupScheduleListeners(); }
            document.getElementById('step' + step).classList.remove('active');
            document.getElementById('stepIndicator' + step).classList.remove('active');
            document.getElementById('stepIndicator' + step).classList.add('completed');
            const next = step + 1;
            document.getElementById('step' + next).classList.add('active');
            document.getElementById('stepIndicator' + next).classList.add('active');
            currentStep = next;
        }

        function prevStep(step) {
            document.getElementById('step' + step).classList.remove('active');
            document.getElementById('stepIndicator' + step).classList.remove('active');
            const prev = step - 1;
            document.getElementById('step' + prev).classList.add('active');
            document.getElementById('stepIndicator' + prev).classList.remove('completed');
            document.getElementById('stepIndicator' + prev).classList.add('active');
            currentStep = prev;
        }

        // ─── Create Game ──────────────────────────────────────
        async function createGame() {
            const btn = document.getElementById('createBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Creating...';

            try {
                const date = document.getElementById('scheduleDate').value;
                const time = document.getElementById('scheduleTime').value;
                const scheduledTime = new Date(`${date}T${time}:00`).toISOString();
                const pointsPerSet = parseInt(document.getElementById('pointsPerSet').value);
                const setsToWin = Math.ceil(setCount / 2);

                await sbFetch('matches', {
                    method: 'POST',
                    extraHeaders: { 'Prefer': 'return=minimal' },
                    body: {
                        tournament_id: tournamentId,
                        sport_id: selectedSportId,
                        team1_id: selectedTeams[0].team_id,
                        team2_id: selectedTeams[1].team_id,
                        scheduled_time: scheduledTime,
                        status: 'scheduled',
                        points_per_set: pointsPerSet,
                        sets_to_win: setsToWin,
                        scorer_id: scorer?.id || null
                    }
                });

                closeDrawer();
                await loadMatches(); // refresh list

            } catch (e) {
                console.error(e);
                showError('Failed to create game: ' + e.message);
                btn.disabled = false;
                btn.textContent = 'Create Game';
            }
        }

        // ─── Reset ────────────────────────────────────────────
        function resetForm() {
            currentStep = 1;
            selectedTeams = [];
            selectedSportId = null;
            setCount = 1;

            document.getElementById('scheduleDate').value = '';
            document.getElementById('scheduleTime').value = '';
            document.getElementById('pointsPerSet').value = '21';
            document.getElementById('setCount').textContent = '1';
            document.getElementById('teamSelection').innerHTML = '';

            for (let i = 1; i <= 4; i++) {
                document.getElementById('stepIndicator' + i).classList.remove('active', 'completed');
                document.getElementById('step' + i).classList.remove('active');
            }
            document.getElementById('stepIndicator1').classList.add('active');
            document.getElementById('step1').classList.add('active');
            document.getElementById('nextBtn1').disabled = true;
            document.getElementById('nextBtn2').disabled = true;
            document.getElementById('nextBtn3').disabled = true;
            document.getElementById('createBtn').disabled = false;
            document.getElementById('createBtn').textContent = 'Create Game';
        }

        function showError(msg) { alert(msg); }

        // ─── Auth + Profile ───────────────────────────────────
        let scorer = null;

        function toggleMenu() {
            const menu = document.getElementById('profileMenu');
            menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
        }

        document.addEventListener('click', e => {
            if (!e.target.closest('.profile-menu') && !e.target.closest('.hamburger-btn')) {
                const menu = document.getElementById('profileMenu');
                if (menu) menu.style.display = 'none';
            }
        });

        // ─── Boot ─────────────────────────────────────────────
        scorer = requireAuth();
        if (scorer) {
            document.getElementById('profileName').textContent     = scorer.name;
            document.getElementById('profileUsername').textContent = '@' + scorer.username;
            document.getElementById('profileAvatar').textContent   = scorer.name.charAt(0).toUpperCase();
            init();
        }
    </script>
</body>
</html>

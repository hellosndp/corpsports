<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Score</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1b2a;
            min-height: 100vh;
            color: white;
        }

        .app { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }

        /* ── Header ── */
        .header {
            padding: 16px 20px 20px;
            background: linear-gradient(180deg, #0d1b2a 0%, #1a2d42 100%);
            position: relative;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .back-btn:hover { background: rgba(255,255,255,0.2); }

        .sport-pill {
            background: rgba(255,255,255,0.15);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .live-pill {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #ea4335;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .live-dot {
            width: 7px; height: 7px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.3); }
        }

        .match-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* ── Score Hero ── */
        .score-hero {
            background: linear-gradient(135deg, #1a2d42 0%, #0d1b2a 100%);
            padding: 28px 20px 32px;
            position: relative;
            overflow: hidden;
        }

        .score-hero::before {
            content: '';
            position: absolute;
            top: -60px; left: -60px;
            width: 200px; height: 200px;
            background: rgba(26,115,232,0.12);
            border-radius: 50%;
        }

        .score-hero::after {
            content: '';
            position: absolute;
            bottom: -40px; right: -40px;
            width: 160px; height: 160px;
            background: rgba(234,67,53,0.1);
            border-radius: 50%;
        }

        .score-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 0;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .team-col { display: flex; flex-direction: column; align-items: center; gap: 6px; }

        .team-badge {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .team-badge-a { color: #64b5f6; }
        .team-badge-b { color: #ef9a9a; }

        .team-name-hero {
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            line-height: 1.3;
            color: white;
        }

        .sets-won-row {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin: 6px 0;
        }

        .set-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
        }

        .set-dot.won-a { background: #64b5f6; }
        .set-dot.won-b { background: #ef9a9a; }

        .score-big {
            font-size: 80px;
            font-weight: 900;
            line-height: 1;
            margin: 8px 0;
        }

        .score-big-a { color: #64b5f6; }
        .score-big-b { color: #ef9a9a; }

        .score-sub {
            font-size: 12px;
            opacity: 0.6;
            font-weight: 500;
        }

        .vs-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 0 10px;
        }

        .vs-text {
            font-size: 13px;
            font-weight: 700;
            opacity: 0.4;
        }

        .set-label-center {
            font-size: 11px;
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: 600;
        }

        /* ── Set History Strip ── */
        .sets-strip {
            background: rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 12px 20px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            align-items: center;
        }

        .sets-strip::-webkit-scrollbar { display: none; }

        .sets-strip-label {
            font-size: 11px;
            font-weight: 700;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            margin-right: 4px;
        }

        .set-card {
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 8px 14px;
            text-align: center;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .set-card-label { font-size: 10px; opacity: 0.5; font-weight: 600; margin-bottom: 3px; }
        .set-card-score { font-size: 15px; font-weight: 800; }
        .set-card.winner-a .set-card-score { color: #64b5f6; }
        .set-card.winner-b .set-card-score { color: #ef9a9a; }
        .set-card.current { background: rgba(100,181,246,0.15); border: 1px solid rgba(100,181,246,0.3); }

        /* ── Bottom white sheet ── */
        .bottom-sheet {
            flex: 1;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 24px 20px;
            margin-top: -4px;
        }

        .sheet-title {
            font-size: 14px;
            font-weight: 700;
            color: #202124;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Point log */
        .point-log { display: flex; flex-direction: column; gap: 0; }

        .log-entry {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
            gap: 12px;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-entry:last-child { border-bottom: none; }

        .log-point-badge {
            width: 34px; height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .log-point-badge-a { background: #e8f0fe; color: #1a73e8; }
        .log-point-badge-b { background: #fce8e6; color: #ea4335; }

        .log-team-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-a { background: #1a73e8; }
        .dot-b { background: #ea4335; }

        .log-team-name { flex: 1; font-size: 14px; font-weight: 500; color: #202124; }
        .log-time { font-size: 12px; color: #bdbdbd; }

        .log-score-snapshot {
            font-size: 12px;
            color: #9e9e9e;
            background: #f8f9fa;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* Match summary for set-based sports */
        .set-result-list { display: flex; flex-direction: column; gap: 10px; }

        .set-result-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .set-result-num {
            width: 28px; height: 28px;
            background: #e8f0fe;
            color: #1a73e8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .set-result-num.done { background: #e6f4ea; color: #34a853; }

        .set-result-body { flex: 1; }

        .set-result-teams {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: #202124;
        }

        .set-result-meta {
            font-size: 12px;
            color: #9e9e9e;
            margin-top: 2px;
        }

        .set-winner-badge {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 8px;
            font-weight: 700;
        }

        .badge-a { background: #e8f0fe; color: #1a73e8; }
        .badge-b { background: #fce8e6; color: #ea4335; }

        /* Empty / loading */
        .empty-log { text-align: center; padding: 28px 0; color: #bdbdbd; font-size: 14px; }

        .spinner-sm {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Match info bar */
        .match-info-bar {
            display: flex;
            justify-content: space-around;
            padding: 14px 20px;
            background: rgba(255,255,255,0.04);
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .info-item { text-align: center; }
        .info-value { font-size: 15px; font-weight: 700; color: white; }
        .info-label { font-size: 11px; opacity: 0.5; margin-top: 2px; }
    </style>
</head>
<body>
<div class="app" id="app">

    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <button class="back-btn" onclick="history.back()">←</button>
            <div class="sport-pill" id="sportPill">Loading...</div>
            <div class="live-pill"><span class="live-dot"></span>LIVE</div>
        </div>
        <div class="match-meta" id="matchMeta">
            <span class="spinner-sm"></span>
        </div>
    </div>

    <!-- Score Hero -->
    <div class="score-hero">
        <div class="score-grid">
            <div class="team-col">
                <div class="team-badge team-badge-a">TEAM A</div>
                <div class="team-name-hero" id="teamAName">—</div>
                <div class="sets-won-row" id="setsWonA"></div>
                <div class="score-big score-big-a" id="scoreA">—</div>
                <div class="score-sub" id="scoreSubA"></div>
            </div>

            <div class="vs-col">
                <div class="vs-text">VS</div>
                <div class="set-label-center" id="setLabelCenter">—</div>
            </div>

            <div class="team-col">
                <div class="team-badge team-badge-b">TEAM B</div>
                <div class="team-name-hero" id="teamBName">—</div>
                <div class="sets-won-row" id="setsWonB"></div>
                <div class="score-big score-big-b" id="scoreB">—</div>
                <div class="score-sub" id="scoreSubB"></div>
            </div>
        </div>
    </div>

    <!-- Sets history strip -->
    <div class="sets-strip" id="setsStrip" style="display:none">
        <span class="sets-strip-label">Sets</span>
        <div id="setsStripCards"></div>
    </div>

    <!-- Match info bar -->
    <div class="match-info-bar" id="matchInfoBar">
        <div class="info-item">
            <div class="info-value" id="infoSetsToWin">—</div>
            <div class="info-label">Sets to win</div>
        </div>
        <div class="info-item">
            <div class="info-value" id="infoPtsPerSet">—</div>
            <div class="info-label">Pts per set</div>
        </div>
        <div class="info-item">
            <div class="info-value" id="infoTime">—</div>
            <div class="info-label">Started</div>
        </div>
    </div>

    <!-- Bottom white sheet -->
    <div class="bottom-sheet">
        <div class="sheet-title" id="sheetTitle">📈 Recent Points</div>
        <div id="pointLogContainer">
            <div class="empty-log">Loading...</div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://izutkprvzuwrxudqvnin.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dXRrcHJ2enV3cnh1ZHF2bmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzYxNjUsImV4cCI6MjA5NTQ1MjE2NX0.MK80nCRgep3h8BpOt-Zy4EbizrXgndLD1XQCJJHIUCU';

    async function sbFetch(path) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    }

    const SPORT_TABLES = {
        'badminton':    { table: 'badminton_points',   type: 'points' },
        'table tennis': { table: 'tabletennis_points', type: 'points' },
        'volleyball':   { table: 'volleyball_points',  type: 'points' },
        'carrom':       { table: 'carrom_points',       type: 'sets'   },
        '8-ball pool':  { table: 'pool_points',         type: 'sets'   }
    };

    const params  = new URLSearchParams(window.location.search);
    const matchId = params.get('match_id');

    let match      = null;
    let teamA      = { id: null, name: '' };
    let teamB      = { id: null, name: '' };
    let sportKey   = '';
    let sportType  = 'points'; // 'points' | 'sets'

    // ── Init ────────────────────────────────────────────────
    async function init() {
        if (!matchId) return showError('No match ID.');
        try {
            const rows = await sbFetch(
                `matches?match_id=eq.${matchId}` +
                `&select=*,team1:teams!matches_team1_id_fkey(team_id,team_name),team2:teams!matches_team2_id_fkey(team_id,team_name),sport:sports(sport_name)&limit=1`
            );
            if (!rows?.length) return showError('Match not found.');
            match  = rows[0];
            teamA  = { id: match.team1.team_id, name: match.team1.team_name };
            teamB  = { id: match.team2.team_id, name: match.team2.team_name };

            const sportName = (match.sport?.sport_name || '').toLowerCase();
            sportKey  = sportName;
            sportType = SPORT_TABLES[sportName]?.type || 'points';

            // Static UI
            document.getElementById('sportPill').textContent   = match.sport?.sport_name || 'Match';
            document.getElementById('teamAName').textContent   = teamA.name;
            document.getElementById('teamBName').textContent   = teamB.name;
            document.getElementById('infoSetsToWin').textContent = match.sets_to_win || '—';
            document.getElementById('infoPtsPerSet').textContent  = match.points_per_set || '—';
            document.getElementById('infoTime').textContent = match.scheduled_time
                ? new Date(match.scheduled_time).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
                : '—';
            document.getElementById('matchMeta').textContent =
                `📅 ${match.scheduled_time
                    ? new Date(match.scheduled_time).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })
                    : '—'}`;

            // Set dots
            renderSetsWonDots(0, 0);

            await refreshScores();
            setInterval(refreshScores, 8000);
        } catch (e) {
            showError('Failed to load: ' + e.message);
        }
    }

    // ── Refresh scores ───────────────────────────────────────
    async function refreshScores() {
        const cfg = SPORT_TABLES[sportKey];
        if (!cfg) return;

        try {
            if (sportType === 'points') {
                await refreshPointsMatch(cfg.table);
            } else {
                await refreshSetsMatch(cfg.table);
            }
        } catch (e) {
            console.error('Score refresh error:', e);
        }
    }

    // Point-by-point (Badminton, TT, Volleyball)
    async function refreshPointsMatch(table) {
        const pts = await sbFetch(`${table}?match_id=eq.${matchId}&order=last_updated.asc&select=*`);
        if (!pts) return;

        // Group by set
        const setNums   = [...new Set(pts.map(p => p.set_number))].sort((a,b) => a-b);
        const maxSet    = setNums.length ? Math.max(...setNums) : 1;
        const curPts    = pts.filter(p => p.set_number === maxSet);
        const scoreA    = curPts.filter(p => p.winning_team_id === teamA.id).length;
        const scoreB    = curPts.filter(p => p.winning_team_id === teamB.id).length;

        // Count completed sets
        let setsA = 0, setsB = 0;
        const setsData = [];
        setNums.forEach(sn => {
            const sp  = pts.filter(p => p.set_number === sn);
            const pA  = sp.filter(p => p.winning_team_id === teamA.id).length;
            const pB  = sp.filter(p => p.winning_team_id === teamB.id).length;
            const ppSet = match.points_per_set || 21;
            const done = pA >= ppSet || pB >= ppSet;
            if (done) { pA >= ppSet ? setsA++ : setsB++; }
            setsData.push({ set: sn, scoreA: pA, scoreB: pB, done, current: sn === maxSet });
        });

        // Update score display
        document.getElementById('scoreA').textContent         = scoreA;
        document.getElementById('scoreB').textContent         = scoreB;
        document.getElementById('setLabelCenter').textContent = `Set ${maxSet}`;
        document.getElementById('scoreSubA').textContent      = `${setsA} set${setsA !== 1 ? 's' : ''}`;
        document.getElementById('scoreSubB').textContent      = `${setsB} set${setsB !== 1 ? 's' : ''}`;

        renderSetsWonDots(setsA, setsB);
        renderSetsStrip(setsData, 'points');

        // Point log — current set only, latest first
        const logPts = [...curPts].reverse();
        renderPointLog(logPts);
    }

    // Set-based (Carrom, Pool)
    async function refreshSetsMatch(table) {
        const col  = table === 'pool_points' ? 'black_ball_team_id' : 'red_team_id';
        const pts  = await sbFetch(`${table}?match_id=eq.${matchId}&order=set_number.asc&select=*`);
        if (!pts) return;

        const setsA    = pts.filter(p => p.winner_team_id === teamA.id).length;
        const setsB    = pts.filter(p => p.winner_team_id === teamB.id).length;
        const totalDone = pts.length;
        const nextSet  = totalDone + 1;

        document.getElementById('scoreA').textContent         = setsA;
        document.getElementById('scoreB').textContent         = setsB;
        document.getElementById('setLabelCenter').textContent = `Sets`;
        document.getElementById('scoreSubA').textContent      = `${setsA} won`;
        document.getElementById('scoreSubB').textContent      = `${setsB} won`;

        renderSetsWonDots(setsA, setsB);

        // Sets strip
        const setsData = pts.map(p => ({
            set:     p.set_number,
            winnerA: p.winner_team_id === teamA.id,
            points:  p.points,
            current: false,
            done:    true
        }));
        if (totalDone < (match.sets_to_win * 2 - 1)) {
            setsData.push({ set: nextSet, current: true, done: false });
        }
        renderSetsStrip(setsData, 'sets');

        // Sheet: show set results
        renderSetResults(pts, col);
    }

    // ── Render helpers ───────────────────────────────────────
    function renderSetsWonDots(setsA, setsB) {
        const target = match.sets_to_win || 2;
        ['A','B'].forEach(t => {
            const won = t === 'A' ? setsA : setsB;
            const el  = document.getElementById(`setsWon${t}`);
            el.innerHTML = Array.from({ length: target }, (_, i) =>
                `<div class="set-dot ${i < won ? `won-${t.toLowerCase()}` : ''}"></div>`
            ).join('');
        });
    }

    function renderSetsStrip(setsData, type) {
        if (!setsData.length) return;
        document.getElementById('setsStrip').style.display = 'flex';
        const container = document.getElementById('setsStripCards');

        container.innerHTML = setsData.map(s => {
            if (!s.done && s.current) {
                return `<div class="set-card current"><div class="set-card-label">SET ${s.set}</div><div class="set-card-score" style="opacity:0.4">—</div></div>`;
            }
            if (type === 'points') {
                const aWon = s.scoreA >= (match.points_per_set || 21);
                return `<div class="set-card ${aWon ? 'winner-a' : 'winner-b'}">
                    <div class="set-card-label">SET ${s.set}</div>
                    <div class="set-card-score">${s.scoreA} – ${s.scoreB}</div>
                </div>`;
            } else {
                return `<div class="set-card ${s.winnerA ? 'winner-a' : 'winner-b'}">
                    <div class="set-card-label">SET ${s.set}</div>
                    <div class="set-card-score">${s.winnerA ? teamA.name.split(' ')[0] : teamB.name.split(' ')[0]}</div>
                </div>`;
            }
        }).join('');
    }

    function renderPointLog(pts) {
        document.getElementById('sheetTitle').textContent = '📈 Current Set Points';
        const container = document.getElementById('pointLogContainer');

        if (!pts.length) {
            container.innerHTML = '<div class="empty-log">No points yet this set</div>';
            return;
        }

        container.innerHTML = `<div class="point-log">` +
            pts.map((p, idx) => {
                const isA   = p.winning_team_id === teamA.id;
                const name  = isA ? teamA.name : teamB.name;
                const ptsA  = pts.slice(idx).filter(x => x.winning_team_id === teamA.id).length;
                const ptsB  = pts.slice(idx).filter(x => x.winning_team_id === teamB.id).length;
                const time  = p.last_updated
                    ? new Date(p.last_updated).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
                    : '';
                return `
                    <div class="log-entry">
                        <div class="log-point-badge ${isA ? 'log-point-badge-a' : 'log-point-badge-b'}">
                            ${isA ? ptsA : ptsB}
                        </div>
                        <div class="log-team-dot ${isA ? 'dot-a' : 'dot-b'}"></div>
                        <div class="log-team-name">${name}</div>
                        <div class="log-score-snapshot">${ptsA} – ${ptsB}</div>
                        <div class="log-time">${time}</div>
                    </div>`;
            }).join('') + `</div>`;
    }

    function renderSetResults(pts, blackCol) {
        document.getElementById('sheetTitle').textContent = '🏆 Set Results';
        const container = document.getElementById('pointLogContainer');

        if (!pts.length) {
            container.innerHTML = '<div class="empty-log">No sets completed yet</div>';
            return;
        }

        container.innerHTML = `<div class="set-result-list">` +
            pts.map(p => {
                const aWon     = p.winner_team_id === teamA.id;
                const winName  = aWon ? teamA.name : teamB.name;
                const blackName = p[blackCol] === teamA.id ? teamA.name : teamB.name;
                const label    = blackCol === 'black_ball_team_id' ? 'Black ball' : 'Red coin';
                return `
                    <div class="set-result-row">
                        <div class="set-result-num done">${p.set_number}</div>
                        <div class="set-result-body">
                            <div class="set-result-teams">
                                <span>Set ${p.set_number}</span>
                                <span class="set-winner-badge ${aWon ? 'badge-a' : 'badge-b'}">🏆 ${winName.split(' ')[0]}</span>
                            </div>
                            <div class="set-result-meta">${label}: ${blackName.split(' ')[0]} · ${p.points || 0} pts</div>
                        </div>
                    </div>`;
            }).join('') + `</div>`;
    }

    function showError(msg) {
        document.getElementById('app').innerHTML = `
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;text-align:center;">
                <div style="font-size:36px;margin-bottom:16px;">⚠️</div>
                <div style="font-size:16px;color:rgba(255,255,255,0.8);margin-bottom:24px;">${msg}</div>
                <button onclick="history.back()" style="padding:12px 28px;background:#1a73e8;color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">Go Back</button>
            </div>`;
    }

    init();
</script>
</body>
</html>

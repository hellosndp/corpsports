<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Score</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #12121e;
            min-height: 100vh;
            color: white;
        }

        .app { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }

        /* ── Header ── */
        .header {
            padding: 16px 20px 18px;
            background: #12121e;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .back-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sport-pill {
            background: rgba(255,255,255,0.18);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .live-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #ea4335;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .live-dot {
            width: 7px; height: 7px;
            background: white;
            border-radius: 50%;
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(1.3); }
        }

        .match-meta {
            text-align: center;
            font-size: 12px;
            opacity: 0.7;
        }

        /* ── Score Hero ── */
        .score-hero {
            background: #12121e;
            padding: 20px 20px 28px;
        }

        .score-grid {
            display: grid;
            grid-template-columns: 1fr 80px 1fr;
            align-items: center;
        }

        .team-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .team-badge {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .team-badge-a { color: #90caf9; }
        .team-badge-b { color: #ef9a9a; }

        .team-name-hero {
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            line-height: 1.3;
            color: white;
        }

        .sets-won-row {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin: 4px 0;
        }

        .set-dot {
            width: 9px; height: 9px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
        }

        .set-dot.won-a { background: #1a73e8; }
        .set-dot.won-b { background: #ea4335; }

        /* Score with zoom animation */
        .score-wrapper { position: relative; height: 100px; display: flex; align-items: center; justify-content: center; }

        .score-big {
            font-size: 80px;
            font-weight: 900;
            line-height: 1;
            transition: none;
        }

        .score-big-a { color: #1a73e8; }
        .score-big-b { color: #ea4335; }

        /* The zoom-burst element */
        .score-burst {
            position: absolute;
            font-size: 80px;
            font-weight: 900;
            line-height: 1;
            pointer-events: none;
            opacity: 0;
        }

        .score-burst-a { color: #1a73e8; }
        .score-burst-b { color: #ea4335; }

        @keyframes scoreBurst {
            0%   { opacity: 1; transform: scale(1); }
            40%  { opacity: 0.9; transform: scale(2.0); }
            70%  { opacity: 0.5; transform: scale(2.6); }
            100% { opacity: 0; transform: scale(2.8); }
        }

        .burst-animate { animation: scoreBurst 1.1s ease-out forwards; }

        .score-sub {
            font-size: 12px;
            opacity: 0.6;
            font-weight: 500;
            margin-top: 2px;
        }

        .vs-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .vs-text {
            font-size: 12px;
            font-weight: 700;
            opacity: 0.4;
        }

        .set-label-center {
            font-size: 12px;
            background: rgba(255,255,255,0.15);
            padding: 5px 12px;
            border-radius: 12px;
            font-weight: 700;
        }

        /* ── Sets row (side by side) ── */
        .sets-row {
            background: #1c1c2e;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .sets-row::-webkit-scrollbar { display: none; }

        .sets-row-label {
            font-size: 11px;
            font-weight: 700;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            flex-shrink: 0;
            margin-right: 4px;
        }

        .set-chip {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 8px 14px;
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 64px;
        }

        .set-chip.current {
            background: rgba(26,115,232,0.25);
            border: 1px solid rgba(26,115,232,0.5);
        }

        .set-chip-label {
            font-size: 10px;
            font-weight: 700;
            opacity: 0.5;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .set-chip-score {
            font-size: 16px;
            font-weight: 800;
        }

        .set-chip.winner-a .set-chip-score { color: #1a73e8; }
        .set-chip.winner-b .set-chip-score { color: #ea4335; }
        .set-chip.current .set-chip-score  { color: rgba(255,255,255,0.5); }

        /* ── Match info bar ── */
        .match-info-bar {
            display: flex;
            justify-content: space-around;
            padding: 12px 20px;
            background: #1c1c2e;
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .info-item { text-align: center; }
        .info-value { font-size: 15px; font-weight: 700; color: white; }
        .info-label { font-size: 10px; opacity: 0.45; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.3px; }

        /* ── Bottom white sheet ── */
        .bottom-sheet {
            flex: 1;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 20px 20px;
        }

        .sheet-title {
            font-size: 14px;
            font-weight: 700;
            color: #202124;
            margin-bottom: 14px;
        }

        /* Point log */
        .log-entry {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
            gap: 12px;
        }

        .log-entry:last-child { border-bottom: none; }

        .log-point-badge {
            width: 34px; height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .log-point-badge-a { background: #e8f0fe; color: #1a73e8; }
        .log-point-badge-b { background: #fce8e6; color: #ea4335; }

        .log-team-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .dot-a { background: #1a73e8; }
        .dot-b { background: #ea4335; }

        .log-team-name { flex: 1; font-size: 14px; font-weight: 500; color: #202124; }
        .log-time { font-size: 12px; color: #bdbdbd; }

        .log-score-snapshot {
            font-size: 12px;
            color: #9e9e9e;
            background: #f8f9fa;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* Set-based results */
        .set-result-list { display: flex; flex-direction: column; gap: 10px; }

        .set-result-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .set-result-num {
            width: 28px; height: 28px;
            background: #e8f0fe; color: #1a73e8;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700;
            flex-shrink: 0;
        }

        .set-result-num.done { background: #e6f4ea; color: #34a853; }
        .set-result-body { flex: 1; }

        .set-result-teams {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: #202124;
        }

        .set-result-meta { font-size: 12px; color: #9e9e9e; margin-top: 2px; }

        .set-winner-badge { font-size: 11px; padding: 3px 8px; border-radius: 8px; font-weight: 700; }
        .badge-a { background: #e8f0fe; color: #1a73e8; }
        .badge-b { background: #fce8e6; color: #ea4335; }


        /* ── Winner banner ── */
        .winner-banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 0 20px 16px;
            padding: 16px 20px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(245,158,11,0.35);
            animation: bannerSlide 0.5s ease;
        }

        @keyframes bannerSlide {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .winner-trophy { font-size: 28px; }

        .winner-text { text-align: center; }
        .winner-label { font-size: 11px; font-weight: 700; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .winner-name  { font-size: 20px; font-weight: 900; color: white; }
        .winner-sub   { font-size: 12px; opacity: 0.8; margin-top: 2px; }

        .empty-log { text-align: center; padding: 28px 0; color: #bdbdbd; font-size: 14px; }

        .spinner-sm {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="app" id="app">

    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <button class="back-btn" onclick="history.back()">←</button>
            <div class="sport-pill" id="sportPill">Loading...</div>
            <div class="live-pill"><span class="live-dot"></span>LIVE</div>
        </div>
        <div class="match-meta" id="matchMeta"><span class="spinner-sm"></span></div>
    </div>

    <!-- Score Hero -->
    <div class="score-hero">
        <div class="score-grid">
            <!-- Team A -->
            <div class="team-col">
                <div class="team-badge team-badge-a">TEAM A</div>
                <div class="team-name-hero" id="teamAName">—</div>
                <div class="sets-won-row" id="setsWonA"></div>
                <div class="score-wrapper">
                    <div class="score-big score-big-a" id="scoreA">—</div>
                    <div class="score-burst score-burst-a" id="burstA"></div>
                </div>
                <div class="score-sub" id="scoreSubA"></div>
            </div>

            <!-- VS / Set label -->
            <div class="vs-col">
                <div class="vs-text">VS</div>
                <div class="set-label-center" id="setLabelCenter">—</div>
            </div>

            <!-- Team B -->
            <div class="team-col">
                <div class="team-badge team-badge-b">TEAM B</div>
                <div class="team-name-hero" id="teamBName">—</div>
                <div class="sets-won-row" id="setsWonB"></div>
                <div class="score-wrapper">
                    <div class="score-big score-big-b" id="scoreB">—</div>
                    <div class="score-burst score-burst-b" id="burstB"></div>
                </div>
                <div class="score-sub" id="scoreSubB"></div>
            </div>
        </div>
    </div>

    <!-- Sets row (side by side) -->
    <div class="sets-row" id="setsRow" style="display:none">
        <span class="sets-row-label">Sets</span>
        <div id="setsRowChips" style="display:flex;gap:8px;"></div>
    </div>

    <!-- Winner banner (shown when match is completed) -->
    <div id="winnerBanner" style="display:none; padding-top:16px;"></div>

    <!-- Match info bar -->
    <div class="match-info-bar">
        <div class="info-item">
            <div class="info-value" id="infoSetsToWin">—</div>
            <div class="info-label">Sets to win</div>
        </div>
        <div class="info-item">
            <div class="info-value" id="infoPtsPerSet">—</div>
            <div class="info-label">Pts per set</div>
        </div>
        <div class="info-item">
            <div class="info-value" id="infoTime">—</div>
            <div class="info-label">Started</div>
        </div>
    </div>

    <!-- Bottom white sheet -->
    <div class="bottom-sheet">
        <div class="sheet-title" id="sheetTitle">📈 Current Set Points</div>
        <div id="pointLogContainer"><div class="empty-log">Loading...</div></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://izutkprvzuwrxudqvnin.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dXRrcHJ2enV3cnh1ZHF2bmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzYxNjUsImV4cCI6MjA5NTQ1MjE2NX0.MK80nCRgep3h8BpOt-Zy4EbizrXgndLD1XQCJJHIUCU';

    async function sbFetch(path) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    }

    const SPORT_TABLES = {
        'badminton':    { table: 'badminton_points',   type: 'points' },
        'table tennis': { table: 'tabletennis_points', type: 'points' },
        'volleyball':   { table: 'volleyball_points',  type: 'points' },
        'carrom':       { table: 'carrom_points',      type: 'sets'   },
        '8-ball pool':  { table: 'pool_points',        type: 'sets'   }
    };

    const params  = new URLSearchParams(window.location.search);
    const matchId = params.get('match_id');

    let match     = null;
    let teamA     = { id: null, name: '' };
    let teamB     = { id: null, name: '' };
    let sportKey  = '';
    let sportType = 'points';

    // Track previous scores to trigger burst animation
    let prevScoreA = null;
    let prevScoreB = null;

    // ── Init ────────────────────────────────────────────────
    async function init() {
        if (!matchId) return showError('No match ID.');
        try {
            const rows = await sbFetch(`matches?match_id=eq.${matchId}&select=match_id,tournament_id,sport_id,team1_id,team2_id,scheduled_time,status,winner_team_id,points_per_set,sets_to_win,round,match_number&limit=1`);
            if (!rows?.length) return showError('Match not found.');
            match = rows[0];

            // Fetch team and sport names separately
            const [t1, t2, sp] = await Promise.all([
                sbFetch(`teams?team_id=eq.${match.team1_id}&select=team_id,team_name&limit=1`),
                sbFetch(`teams?team_id=eq.${match.team2_id}&select=team_id,team_name&limit=1`),
                sbFetch(`sports?sport_id=eq.${match.sport_id}&select=sport_name&limit=1`)
            ]);
            match.team1 = t1?.[0] || null;
            match.team2 = t2?.[0] || null;
            match.sport = sp?.[0] || null;

            teamA    = { id: match.team1_id, name: match.team1?.team_name || '?' };
            teamB    = { id: match.team2_id, name: match.team2?.team_name || '?' };
            sportKey = (match.sport?.sport_name || '').toLowerCase();
            sportType = SPORT_TABLES[sportKey]?.type || 'points';

            document.getElementById('sportPill').textContent    = match.sport?.sport_name || 'Match';
            document.getElementById('teamAName').textContent    = teamA.name;
            document.getElementById('teamBName').textContent    = teamB.name;
            document.getElementById('infoSetsToWin').textContent = match.sets_to_win || '—';
            document.getElementById('infoPtsPerSet').textContent  = match.points_per_set || '—';
            document.getElementById('infoTime').textContent = match.scheduled_time
                ? new Date(match.scheduled_time).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
                : '—';
            document.getElementById('matchMeta').textContent = match.scheduled_time
                ? '📅 ' + new Date(match.scheduled_time).toLocaleString('en-IN', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })
                : '';

            renderSetsWonDots(0, 0);
            await refreshScores();
            setInterval(refreshScores, 2000);
        } catch (e) {
            showError('Failed to load: ' + e.message);
        }
    }

    // ── Score burst animation ─────────────────────────────────
    function triggerBurst(team, value) {
        const burstEl = document.getElementById(`burst${team}`);
        burstEl.textContent = value;
        burstEl.classList.remove('burst-animate');
        // Force reflow to restart animation
        void burstEl.offsetWidth;
        burstEl.classList.add('burst-animate');
    }

    function updateScore(team, newVal) {
        const el    = document.getElementById(`score${team}`);
        const prev  = team === 'A' ? prevScoreA : prevScoreB;
        el.textContent = newVal;
        if (prev !== null && newVal !== prev && newVal !== '—') {
            triggerBurst(team, newVal);
        }
        if (team === 'A') prevScoreA = newVal;
        else prevScoreB = newVal;
    }

    // ── Refresh ──────────────────────────────────────────────
    async function refreshScores() {
        const cfg = SPORT_TABLES[sportKey];
        if (!cfg) return;
        try {
            // Re-fetch match to check if completed
            const updated = await sbFetch(`matches?match_id=eq.${matchId}&select=status,winner_team_id`);
            if (updated?.[0]) {
                const m = updated[0];
                if (m.status === 'completed' && m.winner_team_id) {
                    showWinnerBanner(m.winner_team_id);
                    // swap LIVE pill to FINAL
                    const livePill = document.querySelector('.live-pill');
                    if (livePill && livePill.textContent.includes('LIVE')) {
                        livePill.style.background = '#34a853';
                        livePill.innerHTML = '✓ FINAL';
                    }
                }
            }
            if (sportType === 'points') await refreshPointsMatch(cfg.table);
            else await refreshSetsMatch(cfg.table);
        } catch (e) {
            console.error('Refresh error:', e);
        }
    }

    function showWinnerBanner(winnerId) {
        const banner = document.getElementById('winnerBanner');
        if (banner.style.display === 'block') return; // already shown
        const winnerName = winnerId === teamA.id ? teamA.name : teamB.name;
        const loserName  = winnerId === teamA.id ? teamB.name : teamA.name;
        banner.style.display = 'block';
        banner.innerHTML = `
            <div class="winner-banner">
                <div class="winner-trophy">🏆</div>
                <div class="winner-text">
                    <div class="winner-label">Match Winner</div>
                    <div class="winner-name">${winnerName}</div>
                    <div class="winner-sub">defeated ${loserName}</div>
                </div>
            </div>`;
    }

    async function refreshPointsMatch(table) {
        const pts = await sbFetch(`${table}?match_id=eq.${matchId}&order=last_updated.asc&select=*`);
        if (!pts) return;

        const setNums = [...new Set(pts.map(p => p.set_number))].sort((a,b) => a-b);
        const maxSet  = setNums.length ? Math.max(...setNums) : 1;
        const curPts  = pts.filter(p => p.set_number === maxSet);
        const scoreA  = curPts.filter(p => p.winning_team_id === teamA.id).length;
        const scoreB  = curPts.filter(p => p.winning_team_id === teamB.id).length;
        const ppSet   = match.points_per_set || 21;

        let setsA = 0, setsB = 0;
        const setsData = [];
        setNums.forEach(sn => {
            const sp  = pts.filter(p => p.set_number === sn);
            const pA  = sp.filter(p => p.winning_team_id === teamA.id).length;
            const pB  = sp.filter(p => p.winning_team_id === teamB.id).length;
            const done = pA >= ppSet || pB >= ppSet;
            if (done) { pA >= ppSet ? setsA++ : setsB++; }
            setsData.push({ set: sn, scoreA: pA, scoreB: pB, done, current: sn === maxSet && !done });
        });

        // Add current in-progress set if not done
        if (!setsData.find(s => s.current)) {
            if (setsData.length) {
                const last = setsData[setsData.length - 1];
                if (!last.done) last.current = true;
            }
        }

        updateScore('A', scoreA);
        updateScore('B', scoreB);
        document.getElementById('setLabelCenter').textContent = `Set ${maxSet}`;
        document.getElementById('scoreSubA').textContent = `${setsA} set${setsA !== 1 ? 's' : ''}`;
        document.getElementById('scoreSubB').textContent = `${setsB} set${setsB !== 1 ? 's' : ''}`;

        renderSetsWonDots(setsA, setsB);
        renderSetsRow(setsData, 'points');
        renderPointLog([...curPts].reverse());
    }

    async function refreshSetsMatch(table) {
        const col = table === 'pool_points' ? 'black_ball_team_id' : 'red_team_id';
        const pts = await sbFetch(`${table}?match_id=eq.${matchId}&order=set_number.asc&select=*`);
        if (!pts) return;

        const setsA    = pts.filter(p => p.winner_team_id === teamA.id).length;
        const setsB    = pts.filter(p => p.winner_team_id === teamB.id).length;
        const totalDone = pts.length;
        const nextSet  = totalDone + 1;
        const maxSets  = (match.sets_to_win || 2) * 2 - 1;

        updateScore('A', setsA);
        updateScore('B', setsB);
        document.getElementById('setLabelCenter').textContent = 'Sets';
        document.getElementById('scoreSubA').textContent = `${setsA} won`;
        document.getElementById('scoreSubB').textContent = `${setsB} won`;

        renderSetsWonDots(setsA, setsB);

        const setsData = pts.map(p => ({
            set: p.set_number,
            winnerA: p.winner_team_id === teamA.id,
            points: p.points,
            done: true,
            current: false
        }));
        if (totalDone < maxSets) setsData.push({ set: nextSet, current: true, done: false });
        renderSetsRow(setsData, 'sets');
        renderSetResults(pts, col);
    }

    // ── Render helpers ───────────────────────────────────────
    function renderSetsWonDots(setsA, setsB) {
        const target = match.sets_to_win || 2;
        ['A','B'].forEach(t => {
            const won = t === 'A' ? setsA : setsB;
            const el  = document.getElementById(`setsWon${t}`);
            el.innerHTML = Array.from({ length: target }, (_, i) =>
                `<div class="set-dot ${i < won ? `won-${t.toLowerCase()}` : ''}"></div>`
            ).join('');
        });
    }

    function renderSetsRow(setsData, type) {
        if (!setsData.length) return;
        document.getElementById('setsRow').style.display = 'flex';
        const container = document.getElementById('setsRowChips');

        container.innerHTML = setsData.map(s => {
            if (s.current && !s.done) {
                return `<div class="set-chip current"><div class="set-chip-label">SET ${s.set}</div><div class="set-chip-score">—</div></div>`;
            }
            if (type === 'points') {
                const aWon = s.scoreA >= (match.points_per_set || 21);
                return `<div class="set-chip ${aWon ? 'winner-a' : 'winner-b'}">
                    <div class="set-chip-label">SET ${s.set}</div>
                    <div class="set-chip-score">${s.scoreA} – ${s.scoreB}</div>
                </div>`;
            } else {
                return `<div class="set-chip ${s.winnerA ? 'winner-a' : 'winner-b'}">
                    <div class="set-chip-label">SET ${s.set}</div>
                    <div class="set-chip-score">${s.winnerA ? teamA.name.split(' ')[0] : teamB.name.split(' ')[0]}</div>
                </div>`;
            }
        }).join('');
    }

    function renderPointLog(pts) {
        document.getElementById('sheetTitle').textContent = '📈 Current Set Points';
        const container = document.getElementById('pointLogContainer');
        if (!pts.length) {
            container.innerHTML = '<div class="empty-log">No points yet this set</div>';
            return;
        }

        // Build cumulative scores for display
        const reversed = [...pts].reverse();
        let runA = 0, runB = 0;
        const withScores = reversed.map(p => {
            if (p.winning_team_id === teamA.id) runA++;
            else runB++;
            return { ...p, cumA: runA, cumB: runB };
        }).reverse();

        container.innerHTML = withScores.map(p => {
            const isA  = p.winning_team_id === teamA.id;
            const name = isA ? teamA.name : teamB.name;
            const score = isA ? p.cumA : p.cumB;
            const time  = p.last_updated
                ? new Date(p.last_updated).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
                : '';
            return `
                <div class="log-entry">
                    <div class="log-point-badge ${isA ? 'log-point-badge-a' : 'log-point-badge-b'}">${score}</div>
                    <div class="log-team-dot ${isA ? 'dot-a' : 'dot-b'}"></div>
                    <div class="log-team-name">${name}</div>
                    <div class="log-score-snapshot">${p.cumA} – ${p.cumB}</div>
                    <div class="log-time">${time}</div>
                </div>`;
        }).join('');
    }

    function renderSetResults(pts, blackCol) {
        document.getElementById('sheetTitle').textContent = '🏆 Set Results';
        const container = document.getElementById('pointLogContainer');
        if (!pts.length) {
            container.innerHTML = '<div class="empty-log">No sets completed yet</div>';
            return;
        }
        container.innerHTML = `<div class="set-result-list">` +
            pts.map(p => {
                const aWon     = p.winner_team_id === teamA.id;
                const winName  = aWon ? teamA.name : teamB.name;
                const specName = p[blackCol] === teamA.id ? teamA.name : teamB.name;
                const label    = blackCol === 'black_ball_team_id' ? 'Black ball' : 'Red coin';
                return `
                    <div class="set-result-row">
                        <div class="set-result-num done">${p.set_number}</div>
                        <div class="set-result-body">
                            <div class="set-result-teams">
                                <span>Set ${p.set_number}</span>
                                <span class="set-winner-badge ${aWon ? 'badge-a' : 'badge-b'}">🏆 ${winName.split(' ')[0]}</span>
                            </div>
                            <div class="set-result-meta">${label}: ${specName.split(' ')[0]} · ${p.points || 0} pts</div>
                        </div>
                    </div>`;
            }).join('') + `</div>`;
    }

    function showError(msg) {
        document.getElementById('app').innerHTML = `
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;text-align:center;background:#12121e;">
                <div style="font-size:36px;margin-bottom:16px;">⚠️</div>
                <div style="font-size:16px;color:rgba(255,255,255,0.8);margin-bottom:24px;">${msg}</div>
                <button onclick="history.back()" style="padding:12px 28px;background:#1a73e8;color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;">Go Back</button>
            </div>`;
    }


    init();
</script>
</body>
</html>

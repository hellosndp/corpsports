<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Corporate Sports</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
            padding-bottom: 120px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background-color: #1a73e8;
            color: white;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-refresh { font-size: 12px; opacity: 0.8; font-weight: 400; }

        .table-header {
            display: grid;
            grid-template-columns: 60px 2fr 1fr 1fr 1fr 1fr;
            gap: 8px;
            padding: 16px 20px;
            background-color: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
            font-size: 12px;
            font-weight: 600;
            color: #5f6368;
            text-transform: uppercase;
        }

        .table-row {
            display: grid;
            grid-template-columns: 60px 2fr 1fr 1fr 1fr 1fr;
            gap: 8px;
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            align-items: center;
            transition: background-color 0.2s ease;
        }

        .table-row:hover { background-color: #f8f9fa; }
        .table-row:last-child { border-bottom: none; }

        .position {
            font-size: 18px;
            font-weight: 700;
            color: #202124;
            text-align: center;
        }

        .position.top3 { color: #1a73e8; }

        .team-name {
            font-size: 15px;
            font-weight: 500;
            color: #202124;
        }

        .stat-cell {
            text-align: center;
            font-size: 14px;
            color: #5f6368;
        }

        .stat-cell.points {
            font-weight: 700;
            color: #1a73e8;
            font-size: 16px;
        }

        .header-cell { text-align: center; }
        .header-cell:nth-child(2) { text-align: left; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #9e9e9e;
            font-size: 14px;
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 24px;
            padding: 12px 24px;
            display: flex;
            gap: 32px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            z-index: 1000;
            max-width: 400px;
            width: calc(100% - 40px);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .nav-icon { width: 24px; height: 24px; color: #5f6368; }
        .nav-item.active .nav-icon { color: #1a73e8; }
        .nav-label { font-size: 11px; font-weight: 500; color: #5f6368; }
        .nav-item.active .nav-label { color: #1a73e8; font-weight: 600; }
        .nav-item:hover .nav-icon, .nav-item:hover .nav-label { color: #1a73e8; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <span>Leaderboard</span>
        <span class="header-refresh" id="lastUpdated"></span>
    </div>

    <div class="table-header">
        <div class="header-cell">Pos</div>
        <div class="header-cell" style="text-align:left">Team</div>
        <div class="header-cell">Played</div>
        <div class="header-cell">Win</div>
        <div class="header-cell">Loss</div>
        <div class="header-cell">Points</div>
    </div>

    <div id="tableBody">
        <div style="padding:16px;">
            <div class="skeleton" style="height:52px;margin-bottom:8px;border-radius:8px;"></div>
            <div class="skeleton" style="height:52px;margin-bottom:8px;border-radius:8px;"></div>
            <div class="skeleton" style="height:52px;border-radius:8px;"></div>
        </div>
    </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
    <div class="nav-item" onclick="navigate('home')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span class="nav-label">Home</span>
    </div>
    <div class="nav-item" onclick="navigate('fixtures')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
        <span class="nav-label">Fixtures</span>
    </div>
    <div class="nav-item active" onclick="navigate('leaderboard')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11V3H8v6H2v12h20V11h-6zm-6-6h4v14h-4V5zm-6 6h4v8H4v-8zm16 8h-4v-6h4v6z"/></svg>
        <span class="nav-label">Leaderboard</span>
    </div>
    <div class="nav-item" onclick="navigate('stats')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4zm2.5 2.1h-15V5h15v14.1zm0-16.1h-15c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
        <span class="nav-label">Stats</span>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://izutkprvzuwrxudqvnin.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dXRrcHJ2enV3cnh1ZHF2bmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzYxNjUsImV4cCI6MjA5NTQ1MjE2NX0.MK80nCRgep3h8BpOt-Zy4EbizrXgndLD1XQCJJHIUCU';

    async function loadLeaderboard() {
        try {
            const res = await fetch(`${SUPABASE_URL}/rest/v1/leaderboard_view?select=*&order=points.desc,wins.desc`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const data = await res.json();

            const body = document.getElementById('tableBody');

            if (!data || !data.length) {
                body.innerHTML = '<div class="empty-state">No results yet</div>';
                return;
            }

            body.innerHTML = data.map((team, i) => {
                const pos = i + 1;
                return `
                    <div class="table-row">
                        <div class="position ${pos <= 3 ? 'top3' : ''}">${pos}</div>
                        <div class="team-name">${team.team_name}</div>
                        <div class="stat-cell">${team.played}</div>
                        <div class="stat-cell">${team.wins}</div>
                        <div class="stat-cell">${team.losses}</div>
                        <div class="stat-cell points">${team.points}</div>
                    </div>`;
            }).join('');

            document.getElementById('lastUpdated').textContent =
                '↻ ' + new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

        } catch (e) {
            document.getElementById('tableBody').innerHTML =
                '<div class="empty-state">Failed to load leaderboard</div>';
        }
    }

    function navigate(page) {
        const urls = {
            home: './home.html', fixtures: './fixtures.html',
            leaderboard: './leaderboard.html', stats: './stats.html'
        };
        if (event) { event.preventDefault(); event.stopPropagation(); }
        window.location.href = urls[page];
    }

    loadLeaderboard();
    setInterval(loadLeaderboard, 30000);
</script>
</body>
</html>

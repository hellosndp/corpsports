<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Corporate Sports</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding-bottom: 120px; margin: 0; }
        .container { max-width: 480px; margin: 0 auto; background: white; min-height: 100vh; }

        .header { background: #1a73e8; color: white; padding: 16px 20px; font-size: 18px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .header-refresh { font-size: 12px; opacity: 0.8; font-weight: 400; }

        /* Sport filter tabs */
        .sport-tabs { display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto; border-bottom: 1px solid #e0e0e0; }
        .sport-tabs::-webkit-scrollbar { display: none; }
        .sport-tab { padding: 6px 13px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; border: 1.5px solid #e0e0e0; color: #5f6368; background: white; transition: all 0.2s; flex-shrink: 0; }
        .sport-tab.active { background: #1a73e8; color: white; border-color: #1a73e8; }

        /* Column legend */
        .legend-row { display: flex; align-items: center; justify-content: flex-end; gap: 4px; padding: 8px 20px 4px; }
        .legend-icon { width: 16px; height: 16px; background: #f1f3f4; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #5f6368; cursor: pointer; }
        .legend-tooltip { display: none; position: absolute; right: 20px; top: 100%; background: #202124; color: white; padding: 8px 12px; border-radius: 8px; font-size: 12px; z-index: 50; white-space: nowrap; line-height: 1.8; }
        .legend-wrapper { position: relative; }
        .legend-wrapper:hover .legend-tooltip { display: block; }

        /* Table */
        .table-header {
            display: grid;
            grid-template-columns: 44px 1fr 36px 36px 36px 36px 44px;
            gap: 4px;
            padding: 10px 16px;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
            font-size: 11px;
            font-weight: 700;
            color: #5f6368;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .table-row {
            display: grid;
            grid-template-columns: 44px 1fr 36px 36px 36px 36px 44px;
            gap: 4px;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            align-items: center;
        }

        .table-row:hover { background: #f8f9fa; }
        .table-row:last-child { border-bottom: none; }

        .col-pos { font-size: 16px; font-weight: 700; color: #202124; text-align: center; }
        .col-pos.top3 { color: #1a73e8; }
        .col-team { font-size: 14px; font-weight: 500; color: #202124; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-stat { text-align: center; font-size: 13px; color: #5f6368; }

        .carrom-active .table-header,
        .carrom-active .table-row {
            grid-template-columns: 44px 1fr 36px 36px 36px 36px 40px 44px;
        }
        .carrom-active .gp-col { display: block !important; }
        .carrom-active .gp-cell { display: block !important; }
        .col-pts { text-align: center; font-size: 15px; font-weight: 800; color: #1a73e8; }
        .col-head { text-align: center; }
        .col-head:nth-child(2) { text-align: left; }

        /* Legend bar */
        .legend-bar { padding: 8px 16px 10px; background: #f8f9fa; border-top: 1px solid #e0e0e0; display: flex; flex-wrap: wrap; gap: 12px; }
        .legend-item { font-size: 11px; color: #5f6368; display: flex; align-items: center; gap: 4px; }
        .legend-key { font-weight: 700; color: #202124; }

        .empty-state { text-align: center; padding: 36px 20px; color: #9e9e9e; font-size: 14px; }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; border-radius: 24px; padding: 12px 24px; display: flex; gap: 32px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 1000; max-width: 400px; width: calc(100% - 40px); }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: all 0.2s; flex: 1; }
        .nav-icon { width: 24px; height: 24px; color: #5f6368; }
        .nav-item.active .nav-icon { color: #1a73e8; }
        .nav-label { font-size: 11px; font-weight: 500; color: #5f6368; }
        .nav-item.active .nav-label { color: #1a73e8; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <div style="background:#0a0a14;text-align:center;padding:6px;font-size:10px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.3);text-transform:uppercase;">Off<span style="color:rgba(255,255,255,0.5)">Play</span>.app</div>
    <div class="header">
        <span>Leaderboard</span>
        <a href="login.html" style="color:white;opacity:0.8;text-decoration:none;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;" title="Scorer Login"><svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg></a>
        <span class="header-refresh" id="lastUpdated"></span>
    </div>

    <!-- Sport filter tabs -->
    <div class="sport-tabs" id="sportTabs">
        <div class="skeleton" style="width:60px;height:32px;border-radius:20px;flex-shrink:0;"></div>
        <div class="skeleton" style="width:80px;height:32px;border-radius:20px;flex-shrink:0;"></div>
    </div>

    <!-- Category sub-tabs (shown when sport != All) -->
    <div id="categoryTabs" style="display:none;">
        <div style="display:flex;gap:6px;padding:8px 16px 4px;overflow-x:auto;border-bottom:1px solid #f0f0f0;" id="categoryTabsInner"></div>
    </div>

    <!-- Table header -->
    <div class="table-header" id="tableHeader">
        <div class="col-head">Pos</div>
        <div class="col-head" style="text-align:left">Team</div>
        <div class="col-head">M</div>
        <div class="col-head">W</div>
        <div class="col-head">L</div>
        <div class="col-head">D</div>
        <div class="col-head gp-col" style="display:none">GP</div>
        <div class="col-head">Pts</div>
    </div>

    <div id="tableBody">
        <div style="padding:16px;">
            <div class="skeleton" style="height:48px;margin-bottom:8px;border-radius:8px;"></div>
            <div class="skeleton" style="height:48px;margin-bottom:8px;border-radius:8px;"></div>
            <div class="skeleton" style="height:48px;border-radius:8px;"></div>
        </div>
    </div>

    <!-- Legend at bottom -->
    <div class="legend-bar">
        <div class="legend-item"><span class="legend-key">M</span> = Matches Played</div>
        <div class="legend-item"><span class="legend-key">W</span> = Wins</div>
        <div class="legend-item"><span class="legend-key">L</span> = Losses</div>
        <div class="legend-item"><span class="legend-key">D</span> = Draws</div>
        <div class="legend-item gp-col" style="display:none"><span class="legend-key">GP</span> = Game Points</div>
        <div class="legend-item"><span class="legend-key">Pts</span> = Points</div>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="navigate('home')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span class="nav-label">Home</span>
    </div>
    <div class="nav-item" onclick="navigate('fixtures')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
        <span class="nav-label">Fixtures</span>
    </div>
    <div class="nav-item active" onclick="navigate('leaderboard')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M16 11V3H8v6H2v12h20V11h-6zm-6-6h4v14h-4V5zm-6 6h4v8H4v-8zm16 8h-4v-6h4v6z"/></svg>
        <span class="nav-label">Leaderboard</span>
    </div>
    <div class="nav-item" onclick="navigate('stats')">
        <svg class="nav-icon" fill="currentColor" viewBox="0 0 24 24"><path d="M9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4zm2.5 2.1h-15V5h15v14.1zm0-16.1h-15c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2z"/></svg>
        <span class="nav-label">Stats</span>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://izutkprvzuwrxudqvnin.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dXRrcHJ2enV3cnh1ZHF2bmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzYxNjUsImV4cCI6MjA5NTQ1MjE2NX0.MK80nCRgep3h8BpOt-Zy4EbizrXgndLD1XQCJJHIUCU';

    const SPORTS_DISPLAY = ['All','Badminton','Table Tennis','Volleyball','Carrom','8-Ball Pool'];
    const SPORT_COLORS   = { 'Badminton':'#2e7d32','Table Tennis':'#c62828','Volleyball':'#e65100','Carrom':'#6a1b9a','8-Ball Pool':'#00695c' };

    let allTeams    = [];
    let allCarromPts = [];
    let carromGamePtsMap = {};
    let carromSportId = null;
    let activeCategory = null;
    let allMatches  = [];
    let allSports   = [];
    let participationMap = {}; // team_id -> total participation points
    let activeSport = 'All';
    let ptsPerWin   = 100;

    async function sbFetch(path) {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    }

    async function loadData() {
        const [teams, matches, sports, tournament, participation, carromPts] = await Promise.all([
            sbFetch(`teams?select=team_id,team_name`),
            sbFetch(`matches?select=match_id,sport_id,team1_id,team2_id,status,winner_team_id,category&status=in.(completed,walkover)`),
            sbFetch(`sports?select=sport_id,sport_name`),
            sbFetch(`tournament?select=points_per_win&limit=1`),
            sbFetch(`participation_points?select=team_id,points`).catch(() => []),
            sbFetch(`carrom_points?select=winner_team_id,points`).catch(() => [])
        ]);

        allTeams   = teams   || [];
        allMatches = matches || [];
        allSports  = sports  || [];
        ptsPerWin  = tournament?.[0]?.points_per_win || 100;
        allCarromPts = carromPts || [];

        // Build participation map
        participationMap = {};
        (participation || []).forEach(p => {
            participationMap[p.team_id] = (participationMap[p.team_id] || 0) + p.points;
        });

        // Build carrom game points map: sum all points won per team
        carromGamePtsMap = {};
        allCarromPts.forEach(p => {
            if (!p.winner_team_id || !p.points) return;
            carromGamePtsMap[p.winner_team_id] = (carromGamePtsMap[p.winner_team_id] || 0) + p.points;
        });
    }

    function computeStats(sportFilter) {
        // Filter matches by sport if needed
        let sportId = null;
        if (sportFilter !== 'All') {
            const sport = allSports.find(s => s.sport_name === sportFilter);
            sportId = sport?.sport_id || null;
        }

        const filtered = allMatches.filter(m => {
            if (sportId && m.sport_id !== sportId) return false;
            if (activeCategory && m.category !== activeCategory) return false;
            return true;
        });

        // Build per-team stats
        const stats = {};
        allTeams.forEach(t => {
            stats[t.team_id] = { team_id: t.team_id, team_name: t.team_name, played: 0, wins: 0, losses: 0, draws: 0, pts: 0, gp: 0 };
        });

        filtered.forEach(m => {
            const t1 = stats[m.team1_id], t2 = stats[m.team2_id];
            if (!t1 || !t2) return;

            const done = m.status === 'completed' || m.status === 'walkover';
            if (!done) return;

            t1.played++; t2.played++;

            if (m.winner_team_id === m.team1_id) {
                t1.wins++; t2.losses++;
                t1.pts += ptsPerWin;
            } else if (m.winner_team_id === m.team2_id) {
                t2.wins++; t1.losses++;
                t2.pts += ptsPerWin;
            } else {
                t1.draws++; t2.draws++;
            }
        });

        // Add participation points (only for All or sport that has GS1 participation)
        if (sportFilter === 'All') {
            allTeams.forEach(t => {
                if (stats[t.team_id]) {
                    stats[t.team_id].pts += participationMap[t.team_id] || 0;
                }
            });
        }

        // Add Carrom game points
        const isCarromView = sportFilter === 'All' || sportFilter === 'Carrom';
        if (isCarromView) {
            allTeams.forEach(t => {
                if (stats[t.team_id]) {
                    stats[t.team_id].gp += carromGamePtsMap[t.team_id] || 0;
                }
            });
        }

        // Sort by pts desc, then gp desc, then wins desc
        return Object.values(stats).sort((a, b) =>
            b.pts - a.pts || b.gp - a.gp || b.wins - a.wins || a.team_name.localeCompare(b.team_name)
        );
    }

    function renderSportTabs() {
        const container = document.getElementById('sportTabs');
        container.innerHTML = SPORTS_DISPLAY.map(s => {
            const isActive = activeSport === s;
            const color = s === 'All' ? '#1a73e8' : (SPORT_COLORS[s] || '#1a73e8');
            const style = isActive && s !== 'All' ? `background:${color};color:white;border-color:${color}` : '';
            const cls = isActive ? 'sport-tab active' : 'sport-tab';
            return `<div class="${cls}" style="${style}" onclick="selectSport('${s}')">${s}</div>`;
        }).join('');
    }

    function renderCategoryTabs() {
        const el = document.getElementById('categoryTabs');
        const inner = document.getElementById('categoryTabsInner');
        if (activeSport === 'All') { el.style.display = 'none'; activeCategory = null; return; }
        const sportObj = allSports.find(s => s.sport_name === activeSport);
        const sportId  = sportObj?.sport_id;
        const cats = [...new Set(allMatches.filter(m => m.sport_id === sportId && m.category).map(m => m.category))].sort();
        if (!cats.length) { el.style.display = 'none'; activeCategory = null; return; }
        el.style.display = 'block';
        inner.innerHTML = [null, ...cats].map(cat => {
            const label = cat === null ? 'All' : cat;
            const isActive = activeCategory === cat;
            const style = isActive ? 'background:#1a73e8;color:white;border-color:#1a73e8;' : 'background:white;color:#5f6368;border:1.5px solid #e0e0e0;';
            return `<div onclick="selectCategory(${cat===null?'null':`'${cat}'`})" style="padding:5px 12px;border-radius:16px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;flex-shrink:0;transition:all 0.2s;${style}">${label}</div>`;
        }).join('');
    }

    function selectCategory(cat) {
        activeCategory = cat;
        renderCategoryTabs();
        renderTable();
    }

    function selectSport(sport) {
        activeSport = sport;
        activeCategory = null;
        renderSportTabs();
        renderCategoryTabs();
        renderTable();
        // Show GP column only for Carrom
        const container = document.querySelector('.container');
        if (sport === 'Carrom') {
            container.classList.add('carrom-active');
        } else {
            container.classList.remove('carrom-active');
        }
    }

    function renderTable() {
        const body = document.getElementById('tableBody');
        const data = computeStats(activeSport);

        if (!data.length) {
            body.innerHTML = '<div class="empty-state">No data yet</div>';
            return;
        }

        body.innerHTML = data.map((t, i) => {
            const pos = i + 1;
            return `
                <div class="table-row">
                    <div class="col-pos ${pos <= 3 ? 'top3' : ''}">${pos}</div>
                    <div class="col-team" title="${t.team_name}">${t.team_name}</div>
                    <div class="col-stat">${t.played}</div>
                    <div class="col-stat">${t.wins}</div>
                    <div class="col-stat">${t.losses}</div>
                    <div class="col-stat">${t.draws}</div>
                    <div class="col-stat gp-cell" style="display:none;color:${t.gp>0?'#e65100':'#5f6368'};font-weight:${t.gp>0?'700':'400'}">${t.gp||0}</div>
                    <div class="col-pts">${t.pts}</div>
                </div>`;
        }).join('');

        document.getElementById('lastUpdated').textContent =
            '↻ ' + new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    async function refresh() {
        try {
            await loadData();
            renderSportTabs();
            renderCategoryTabs();
            renderTable();
        } catch(e) {
            document.getElementById('tableBody').innerHTML = '<div class="empty-state">Failed to load</div>';
            console.error(e);
        }
    }

    function navigate(page) {
        const urls = { home:'./home.html', fixtures:'./fixtures.html', leaderboard:'./leaderboard.html', stats:'./stats.html' };
        window.location.href = urls[page];
    }

    refresh();
    setInterval(refresh, 30000);
</script>
</body>
</html>

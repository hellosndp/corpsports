<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorer - Corporate Sports</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            background-color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: #1a73e8;
            color: white;
            padding: 14px 20px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px 4px 0;
        }

        .match-title {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .header-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 13px;
        }

        .set-info {
            opacity: 0.9;
            font-weight: 500;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background-color: rgba(255,255,255,0.15);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .live-dot {
            width: 7px;
            height: 7px;
            background-color: #4ade80;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .header-time {
            text-align: center;
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
        }

        /* Score Section */
        .score-section {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 0;
            padding: 24px 16px 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .team-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .team-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .team-a .team-label { color: #1a73e8; }
        .team-b .team-label { color: #ea4335; }

        .team-name-text {
            font-size: 16px;
            font-weight: 600;
            color: #202124;
            text-align: center;
        }

        .score-display {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            margin: 8px 0;
        }

        .team-a .score-display { color: #1a73e8; }
        .team-b .score-display { color: #ea4335; }

        .score-controls {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }

        .ctrl-btn {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            border: 2px solid;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            background: white;
        }

        .ctrl-btn:active {
            transform: scale(0.92);
        }

        .minus-btn-a {
            border-color: #1a73e8;
            color: #1a73e8;
        }

        .minus-btn-a:hover {
            background-color: #e8f0fe;
        }

        .plus-btn-a {
            border-color: #1a73e8;
            background-color: #1a73e8;
            color: white;
        }

        .plus-btn-a:hover {
            background-color: #1557b0;
        }

        .minus-btn-b {
            border-color: #ea4335;
            color: #ea4335;
        }

        .minus-btn-b:hover {
            background-color: #fce8e6;
        }

        .plus-btn-b {
            border-color: #ea4335;
            background-color: #ea4335;
            color: white;
        }

        .plus-btn-b:hover {
            background-color: #c5221f;
        }

        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
        }

        .vs-circle {
            width: 40px;
            height: 40px;
            border: 2px solid #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: #9e9e9e;
            background: white;
        }

        /* Set Score Summary */
        .set-scores {
            padding: 10px 16px;
            background-color: #f8f9fa;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .set-scores-label {
            font-size: 12px;
            color: #5f6368;
            font-weight: 600;
        }

        .set-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .set-chip {
            font-size: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            background-color: #e8f0fe;
            color: #1a73e8;
        }

        /* Points Log */
        .log-section {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }

        .log-header {
            padding: 14px 20px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 5;
        }

        .log-title {
            font-size: 14px;
            font-weight: 700;
            color: #202124;
        }

        .log-list {
            padding: 0 16px;
        }

        .log-entry {
            display: flex;
            align-items: center;
            padding: 11px 0;
            border-bottom: 1px solid #f5f5f5;
            gap: 12px;
            animation: slideIn 0.25s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-point {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .log-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .team-a-dot { background-color: #1a73e8; }
        .team-b-dot { background-color: #ea4335; }

        .log-team {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            color: #202124;
        }

        .log-time {
            font-size: 12px;
            color: #9e9e9e;
            font-weight: 400;
        }

        /* Bottom Actions */
        .bottom-actions {
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #f0f0f0;
            background: white;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1.5px solid;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
            background: white;
        }

        .undo-btn {
            border-color: #e0e0e0;
            color: #5f6368;
        }

        .undo-btn:hover { background-color: #f5f5f5; }

        .end-btn {
            border-color: #ea4335;
            color: #ea4335;
        }

        .end-btn:hover { background-color: #fce8e6; }

        /* Bottom Tab Bar */
        .tab-bar {
            display: flex;
            border-top: 1px solid #e0e0e0;
            background: white;
        }

        .tab-item {
            flex: 1;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            color: #9e9e9e;
            transition: all 0.2s;
        }

        .tab-item.active {
            color: #1a73e8;
        }

        .tab-icon {
            font-size: 20px;
        }

        .tab-label {
            font-size: 11px;
            font-weight: 500;
        }

        /* Winner Popup */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
        }

        .overlay.visible {
            display: flex;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup {
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 32px 24px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .trophy-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            box-shadow: 0 4px 16px rgba(251, 191, 36, 0.4);
        }

        .popup-title {
            font-size: 20px;
            font-weight: 700;
            color: #202124;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .popup-subtitle {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 28px;
        }

        .popup-confirm-btn {
            width: 100%;
            padding: 16px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        .popup-confirm-btn:hover { background-color: #1557b0; }

        .popup-cancel-btn {
            width: 100%;
            padding: 14px;
            background-color: transparent;
            color: #5f6368;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .popup-cancel-btn:hover { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <div class="app">

        <!-- Header -->
        <div class="header">
            <div class="header-top">
                <button class="back-btn">←</button>
                <div class="match-title">Match #TT-015</div>
                <div style="width:32px"></div>
            </div>
            <div class="header-meta">
                <span class="set-info" id="setLabel">Set #1</span>
                <span class="live-badge">
                    <span class="live-dot"></span>
                    LIVE
                </span>
            </div>
            <div class="header-time">📅 &nbsp;Today, 10:30 AM</div>
        </div>

        <!-- Score Section -->
        <div class="score-section">
            <!-- Team A -->
            <div class="team-panel team-a">
                <div class="team-label">Team A</div>
                <div class="team-name-text">Ping Masters</div>
                <div class="score-display" id="scoreA">0</div>
                <div class="score-controls">
                    <button class="ctrl-btn minus-btn-a" onclick="adjustScore('A', -1)">−</button>
                    <button class="ctrl-btn plus-btn-a" onclick="adjustScore('A', 1)">+</button>
                </div>
            </div>

            <!-- VS -->
            <div class="vs-divider">
                <div class="vs-circle">VS</div>
            </div>

            <!-- Team B -->
            <div class="team-panel team-b">
                <div class="team-label">Team B</div>
                <div class="team-name-text">Spin Kings</div>
                <div class="score-display" id="scoreB">0</div>
                <div class="score-controls">
                    <button class="ctrl-btn minus-btn-b" onclick="adjustScore('B', -1)">−</button>
                    <button class="ctrl-btn plus-btn-b" onclick="adjustScore('B', 1)">+</button>
                </div>
            </div>
        </div>

        <!-- Set Scores -->
        <div class="set-scores">
            <span class="set-scores-label">Sets:</span>
            <div class="set-chips" id="setChips">
                <span class="set-chip">0 - 0</span>
            </div>
        </div>

        <!-- Points Log -->
        <div class="log-section">
            <div class="log-header">
                <span style="font-size:16px">📈</span>
                <span class="log-title">Recent Points</span>
            </div>
            <div class="log-list" id="logList">
                <div style="text-align:center; padding: 32px 20px; color: #9e9e9e; font-size:14px;">
                    No points yet. Start scoring!
                </div>
            </div>
        </div>

        <!-- Bottom Actions -->
        <div class="bottom-actions">
            <button class="action-btn undo-btn" onclick="undoLastPoint()">
                ↩ Undo Last Point
            </button>
            <button class="action-btn end-btn" onclick="endMatch()">
                🏁 End Match
            </button>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar">
            <div class="tab-item active">
                <span class="tab-icon">🏓</span>
                <span class="tab-label">Score</span>
            </div>
            <div class="tab-item">
                <span class="tab-icon">📋</span>
                <span class="tab-label">Points Log</span>
            </div>
            <div class="tab-item">
                <span class="tab-icon">ℹ️</span>
                <span class="tab-label">Match Info</span>
            </div>
        </div>
    </div>

    <!-- Winner Popup -->
    <div class="overlay" id="winnerOverlay">
        <div class="popup">
            <div class="trophy-icon">🏆</div>
            <div class="popup-title" id="popupTitle">Ping Masters reached 21 points!</div>
            <div class="popup-subtitle">Declare Set Winner?</div>
            <button class="popup-confirm-btn" id="popupConfirmBtn" onclick="declareWinner()"></button>
            <button class="popup-cancel-btn" onclick="closePopup()">Cancel</button>
        </div>
    </div>

    <script>
        const SET_POINTS = 21; // points to win a set
        const TEAM_NAMES = { A: 'Ping Masters', B: 'Spin Kings' };

        let scores = { A: 0, B: 0 };
        let setScores = { A: 0, B: 0 }; // sets won
        let currentSet = 1;
        let pointLog = [];
        let pendingWinner = null;
        let completedSets = [];

        function getTime() {
            const now = new Date();
            return now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function adjustScore(team, delta) {
            if (delta < 0 && scores[team] <= 0) return;

            scores[team] += delta;
            document.getElementById('score' + team).textContent = scores[team];

            if (delta > 0) {
                // Add to log
                const entry = {
                    team,
                    scoreA: scores.A,
                    scoreB: scores.B,
                    time: getTime()
                };
                pointLog.unshift(entry);
                renderLog();

                // Check if set won
                if (scores[team] >= SET_POINTS) {
                    triggerWinnerPopup(team);
                }
            } else {
                // Remove last log entry if it was for this team
                if (pointLog.length > 0 && pointLog[0].team === team) {
                    pointLog.shift();
                    renderLog();
                }
            }
        }

        function triggerWinnerPopup(team) {
            pendingWinner = team;
            const name = TEAM_NAMES[team];
            document.getElementById('popupTitle').textContent = `${name} reached ${SET_POINTS} points!`;
            document.getElementById('popupConfirmBtn').textContent = `Declare ${name} as Set Winner`;
            document.getElementById('winnerOverlay').classList.add('visible');
        }

        function declareWinner() {
            if (!pendingWinner) return;

            setScores[pendingWinner]++;
            completedSets.push({ a: scores.A, b: scores.B, winner: pendingWinner });

            // Update set chips
            renderSetChips();

            // Reset for next set
            scores.A = 0;
            scores.B = 0;
            currentSet++;
            pointLog = [];

            document.getElementById('scoreA').textContent = '0';
            document.getElementById('scoreB').textContent = '0';
            document.getElementById('setLabel').textContent = `Set #${currentSet}`;

            renderLog();
            closePopup();
        }

        function renderSetChips() {
            const container = document.getElementById('setChips');
            if (completedSets.length === 0) {
                container.innerHTML = '<span class="set-chip">0 - 0</span>';
                return;
            }
            container.innerHTML = completedSets.map(s => {
                const color = s.winner === 'A' ? '#1a73e8' : '#ea4335';
                return `<span class="set-chip" style="background:${color}20; color:${color}">${s.a} - ${s.b}</span>`;
            }).join('');
        }

        function closePopup() {
            document.getElementById('winnerOverlay').classList.remove('visible');
            pendingWinner = null;
        }

        function renderLog() {
            const list = document.getElementById('logList');
            if (pointLog.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding: 32px 20px; color: #9e9e9e; font-size:14px;">No points yet. Start scoring!</div>';
                return;
            }

            list.innerHTML = pointLog.map(entry => {
                const isA = entry.team === 'A';
                const dotClass = isA ? 'team-a-dot' : 'team-b-dot';
                const pointColor = isA ? '#1a73e8' : '#ea4335';
                const teamName = TEAM_NAMES[entry.team];
                const score = isA ? entry.scoreA : entry.scoreB;

                return `
                    <div class="log-entry">
                        <div class="log-point" style="background:${pointColor}15; color:${pointColor}">${score}</div>
                        <div class="log-dot ${dotClass}"></div>
                        <div class="log-team">${teamName}</div>
                        <div class="log-time">${entry.time}</div>
                    </div>
                `;
            }).join('');
        }

        function undoLastPoint() {
            if (pointLog.length === 0) return;

            const last = pointLog[0];
            scores[last.team] = Math.max(0, scores[last.team] - 1);
            document.getElementById('score' + last.team).textContent = scores[last.team];
            pointLog.shift();
            renderLog();
        }

        function endMatch() {
            if (confirm('Are you sure you want to end the match?')) {
                alert('Match ended! Final sets: ' + JSON.stringify(completedSets));
            }
        }
    </script>
</body>
</html>

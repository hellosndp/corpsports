<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OffPlay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top bar */
        .topbar {
            width: 100%;
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand {
            font-size: 18px;
            font-weight: 800;
            color: #202124;
            letter-spacing: -0.5px;
        }

        .brand span { color: #1a73e8; }

        /* Content */
        .content {
            width: 100%;
            max-width: 480px;
            padding: 32px 20px;
            flex: 1;
        }

        .section-label {
            font-size: 12px;
            font-weight: 700;
            color: #9e9e9e;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
        }

        /* Company card */
        .company-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
            text-decoration: none;
            display: block;
            transition: all 0.2s;
            border: 1px solid #e0e0e0;
        }

        .company-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); transform: translateY(-1px); }
        .company-card:active { transform: scale(0.99); }

        /* Logo banner */
        .card-logo-banner {
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            padding: 28px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }

        .card-logo-banner img {
            max-width: 180px;
            max-height: 80px;
            object-fit: contain;
        }

        /* Card body */
        .card-body {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-info {}
        .card-name {
            font-size: 16px;
            font-weight: 700;
            color: #202124;
            margin-bottom: 4px;
        }

        .card-sub {
            font-size: 12px;
            color: #5f6368;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #fce8e6;
            color: #ea4335;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .live-dot {
            width: 6px; height: 6px;
            background: #ea4335;
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .card-arrow {
            font-size: 22px;
            color: #bdbdbd;
        }

        .footer {
            padding: 24px;
            text-align: center;
            font-size: 12px;
            color: #bdbdbd;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="brand">Off<span>Play</span>.app</div>
    </div>

    <div class="content">
        <div class="section-label">Organizations</div>

        <a class="company-card" href="home.html" id="npciCard">
            <div class="card-logo-banner">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/NPCI-Logo.png/1280px-NPCI-Logo.png"
                     alt="NPCI"
                     onerror="this.style.display='none';this.parentElement.innerHTML+='<span style=\'font-size:32px;font-weight:900;color:#1a73e8\'>NPCI</span>'">
            </div>
            <div class="card-body">
                <div class="card-info">
                    <div class="card-name">NPCI Sports</div>
                    <div class="card-sub">
                        <span>Corporate Tournament 2025</span>
                    </div>
                </div>
                <div class="card-arrow">›</div>
            </div>
        </a>
    </div>

    <div class="footer">More organizations coming soon</div>

    <script>
        const SUPABASE_URL = 'https://izutkprvzuwrxudqvnin.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dXRrcHJ2enV3cnh1ZHF2bmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzYxNjUsImV4cCI6MjA5NTQ1MjE2NX0.MK80nCRgep3h8BpOt-Zy4EbizrXgndLD1XQCJJHIUCU';

        async function checkLive() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/matches?status=eq.live&select=match_id&limit=1`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const data = await res.json();
                if (data && data.length > 0) {
                    const sub = document.querySelector('.card-sub');
                    sub.innerHTML = `<span>Corporate Tournament 2025</span> <span class="live-badge"><span class="live-dot"></span>Live</span>`;
                }
            } catch(e) {}
        }
        checkLive();
    </script>
</body>
</html>

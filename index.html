<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OffPlay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a14;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 20px;
        }

        /* App name */
        .app-name {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            margin-bottom: 52px;
            position: relative;
        }

        .app-name span {
            color: rgba(255,255,255,0.6);
        }

        .app-name::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 1px;
            background: rgba(255,255,255,0.15);
        }

        /* Cards container */
        .cards { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 360px; }

        /* Company card */
        .company-card {
            background: #16162a;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 24px 20px;
            cursor: pointer;
            transition: all 0.25s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 18px;
            position: relative;
            overflow: hidden;
        }

        .company-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(26,115,232,0.08) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .company-card:hover { border-color: rgba(26,115,232,0.4); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(26,115,232,0.15); }
        .company-card:hover::before { opacity: 1; }
        .company-card:active { transform: scale(0.98); }

        .company-logo-wrap {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .company-logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 6px;
        }

        .company-info { flex: 1; }

        .company-name {
            font-size: 17px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
            letter-spacing: -0.2px;
        }

        .company-meta {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meta-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.2); }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 700;
            color: #ea4335;
        }

        .live-dot {
            width: 6px; height: 6px;
            background: #ea4335;
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .card-arrow {
            font-size: 18px;
            color: rgba(255,255,255,0.2);
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .company-card:hover .card-arrow { color: rgba(26,115,232,0.7); transform: translateX(2px); }

        /* Footer */
        .footer {
            margin-top: 48px;
            font-size: 11px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 1px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="app-name">Off<span>Play</span>.app</div>

    <div class="cards" id="cards">
        <!-- NPCI card -->
        <a class="company-card" href="home.html" id="npciCard">
            <div class="company-logo-wrap">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/NPCI-Logo.png/1280px-NPCI-Logo.png"
                     alt="NPCI Logo"
                     onerror="this.parentElement.innerHTML='<span style=\'font-size:20px;font-weight:800;color:#1a73e8\'>N</span>'">
            </div>
            <div class="company-info">
                <div class="company-name">NPCI Sports</div>
                <div class="company-meta">
                    <span>Corporate Tournament</span>
                    <div class="meta-dot"></div>
                    <span>2025</span>
                </div>
            </div>
            <div class="card-arrow">›</div>
        </a>
    </div>

    <div class="footer">More organizations coming soon</div>

    <script>
        // Check for live matches and show indicator
        const SUPABASE_URL = 'https://izutkprvzuwrxudqvnin.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6dXRrcHJ2enV3cnh1ZHF2bmluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NzYxNjUsImV4cCI6MjA5NTQ1MjE2NX0.MK80nCRgep3h8BpOt-Zy4EbizrXgndLD1XQCJJHIUCU';

        async function checkLive() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/matches?status=eq.live&select=match_id&limit=1`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
                const data = await res.json();
                if (data && data.length > 0) {
                    const meta = document.querySelector('#npciCard .company-meta');
                    meta.innerHTML = `<div class="live-indicator"><div class="live-dot"></div>Live now</div>`;
                }
            } catch(e) {}
        }
        checkLive();
    </script>
</body>
</html>
